<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Βιολογία Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #0a1628;
    --surface: #111f3a;
    --card:    #162548;
    --border:  #1e3a6e;
    --accent1: #1a6bb5;
    --green:   #3ab26e;
    --red:     #ef4444;
    --amber:   #f59e0b;
    --blue:    #60a5fa;
    --text:    #e8f0ff;
    --muted:   #7a9cc8;
    --mono:    'Space Mono', monospace;
    --sans:    'Sora', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  .bg-grid {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: linear-gradient(rgba(26,107,181,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(26,107,181,.06) 1px,transparent 1px);
    background-size: 40px 40px;
  }
  .bg-orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
  .orb1 { width: 500px; height: 500px; background: rgba(26,107,181,.18); top: -100px; right: -100px; }
  .orb2 { width: 400px; height: 400px; background: rgba(58,178,110,.12); bottom: -80px; left: -80px; }
  #app { position: relative; z-index: 1; max-width: 780px; margin: 0 auto; padding: 24px 16px 60px; }
  header { display: flex; align-items: center; gap: 16px; padding: 20px 0 32px; }
  .logo-box {
    width: 52px; height: 52px; border-radius: 14px;
    background: linear-gradient(135deg, #1a6bb5, #3ab26e);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-weight: 700; font-size: 11px; color: white;
    box-shadow: 0 0 24px rgba(26,107,181,.5);
  }
  .header-text h1 {
    font-size: 22px; font-weight: 700;
    background: linear-gradient(90deg, #60a5fa, #3ab26e);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header-text p { font-size: 13px; color: var(--muted); margin-top: 2px; }
  #chapterSelect { display: flex; flex-direction: column; gap: 20px; }
  .chapter-group h2 { font-size: 13px; font-family: var(--mono); color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  .chapter-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(200px,1fr)); gap: 10px; }
  .ch-btn { padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: var(--sans); font-size: 14px; cursor: pointer; text-align: left; transition: all .2s; }
  .ch-btn:hover { border-color: var(--accent1); background: rgba(26,107,181,.1); }
  .ch-btn .ch-title { font-weight: 600; font-size: 13px; }
  .ch-btn .ch-count { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: var(--mono); }
  .ch-btn.all-btn { background: linear-gradient(135deg,rgba(26,107,181,.2),rgba(58,178,110,.1)); border-color: var(--accent1); font-weight: 700; color: var(--blue); }
  #quizArea { display: none; }
  .controls-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
  .ctrl-btn { display: flex; align-items: center; gap: 7px; padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: var(--sans); font-size: 13px; cursor: pointer; transition: all .2s; }
  .ctrl-btn:hover { border-color: var(--accent1); }
  .ctrl-btn.active { background: rgba(26,107,181,.2); border-color: var(--accent1); color: var(--blue); }
  .progress-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px 20px; margin-bottom: 20px; }
  .progress-top { display: flex; justify-content: space-between; margin-bottom: 10px; }
  .progress-label { font-size: 13px; color: var(--muted); }
  .progress-counter { font-family: var(--mono); font-size: 13px; color: var(--blue); }
  .progress-bar-bg { height: 6px; background: rgba(255,255,255,.06); border-radius: 99px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg,var(--accent1),var(--green)); transition: width .4s cubic-bezier(.4,0,.2,1); }
  .progress-stats { display: flex; gap: 16px; margin-top: 12px; }
  .stat { font-size: 12px; }
  .stat span { font-family: var(--mono); font-weight: 700; }
  .stat.correct span { color: var(--green); }
  .stat.wrong span { color: var(--red); }
  .stat.time span { color: var(--amber); }
  .q-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 28px; animation: slideIn .35s cubic-bezier(.4,0,.2,1); }
  @keyframes slideIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .q-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
  .badge { font-size: 11px; font-family: var(--mono); padding: 3px 9px; border-radius: 99px; border: 1px solid; letter-spacing: .5px; text-transform: uppercase; }
  .badge-easy   { color: var(--green); border-color: rgba(58,178,110,.3);  background: rgba(58,178,110,.08); }
  .badge-medium { color: var(--amber); border-color: rgba(245,158,11,.3);  background: rgba(245,158,11,.08); }
  .badge-hard   { color: var(--red);   border-color: rgba(239,68,68,.3);   background: rgba(239,68,68,.08); }
  .badge-type   { color: var(--muted); border-color: rgba(122,156,200,.2); background: transparent; }
  .badge-page   { color: var(--blue);  border-color: rgba(96,165,250,.3);  background: rgba(96,165,250,.06); }
  .q-number { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .q-topic  { font-size: 12px; color: var(--blue); margin-bottom: 8px; font-style: italic; }
  .q-text   { font-size: 18px; font-weight: 600; line-height: 1.5; color: var(--text); margin-bottom: 24px; }
  .options-list { display: flex; flex-direction: column; gap: 10px; }
  .option-btn { display: flex; align-items: center; gap: 14px; padding: 14px 18px; border-radius: 12px; border: 1px solid var(--border); background: rgba(255,255,255,.03); color: var(--text); font-family: var(--sans); font-size: 15px; cursor: pointer; text-align: left; transition: all .18s; }
  .option-btn:hover:not(:disabled) { border-color: var(--accent1); background: rgba(26,107,181,.08); }
  .option-letter { width: 30px; height: 30px; border-radius: 8px; background: rgba(255,255,255,.06); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 13px; font-weight: 700; flex-shrink: 0; transition: all .18s; }
  .option-btn.correct   { border-color: var(--green); background: rgba(58,178,110,.08); }
  .option-btn.correct .option-letter { background: var(--green); border-color: var(--green); color: #fff; }
  .option-btn.wrong     { border-color: var(--red); background: rgba(239,68,68,.08); }
  .option-btn.wrong .option-letter   { background: var(--red); border-color: var(--red); color: #fff; }
  .open-wrap { background: rgba(26,107,181,.06); border: 1px solid rgba(26,107,181,.2); border-left: 3px solid var(--accent1); border-radius: 12px; padding: 16px; margin-bottom: 12px; font-size: 14px; color: var(--muted); line-height: 1.7; }
  .open-label { font-size: 10px; font-family: var(--mono); color: var(--accent1); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
  .open-reveal-btn { padding: 12px 24px; border-radius: 10px; background: rgba(26,107,181,.15); border: 1px solid var(--accent1); color: var(--blue); font-family: var(--sans); font-size: 14px; font-weight: 600; cursor: pointer; transition: all .18s; width: 100%; }
  .open-reveal-btn:hover { background: rgba(26,107,181,.25); }
  .open-answer { display: none; background: rgba(58,178,110,.08); border: 1px solid rgba(58,178,110,.3); border-left: 3px solid var(--green); border-radius: 12px; padding: 16px; margin-top: 12px; font-size: 14px; color: var(--text); line-height: 1.7; animation: fadeIn .3s ease; }
  .open-answer.show { display: block; }
  .open-answer-label { font-size: 10px; font-family: var(--mono); color: var(--green); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
  .fb-wrap { display: flex; flex-direction: column; gap: 12px; }
  .fb-hint { font-size: 12px; color: var(--muted); font-family: var(--mono); }
  .fb-input-row { display: flex; gap: 10px; align-items: center; }
  .fb-input { flex: 1; padding: 14px 18px; border-radius: 12px; border: 1px solid var(--border); background: rgba(255,255,255,.04); color: var(--text); font-family: var(--sans); font-size: 16px; outline: none; transition: all .18s; }
  .fb-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(96,165,250,.15); }
  .fb-input.correct { border-color: var(--green); background: rgba(58,178,110,.08); color: var(--green); }
  .fb-input.wrong   { border-color: var(--red);   background: rgba(239,68,68,.08);  color: var(--red); }
  .fb-input:disabled { opacity: .7; cursor: not-allowed; }
  .fb-submit { padding: 14px 22px; border-radius: 12px; background: rgba(96,165,250,.15); border: 1px solid var(--blue); color: var(--blue); font-family: var(--sans); font-size: 14px; font-weight: 600; cursor: pointer; transition: all .18s; white-space: nowrap; }
  .fb-submit:hover { background: rgba(96,165,250,.25); }
  .fb-submit:disabled { opacity: .4; cursor: not-allowed; }
  .fb-correct-answer { margin-top: 6px; font-size: 13px; color: var(--green); font-family: var(--mono); }
  .hint-box { margin-top: 12px; padding: 10px 14px; background: rgba(245,158,11,.08); border: 1px solid rgba(245,158,11,.2); border-radius: 10px; font-size: 13px; color: var(--amber); display: none; }
  .hint-box.show { display: block; }
  .explanation { margin-top: 18px; padding: 16px 18px; background: rgba(255,255,255,.04); border-radius: 12px; border-left: 3px solid var(--blue); font-size: 14px; line-height: 1.6; color: var(--muted); animation: fadeIn .3s ease; }
  .explanation strong { color: var(--text); }
  .q-actions { display: flex; gap: 10px; margin-top: 22px; justify-content: flex-end; flex-wrap: wrap; }
  .btn { padding: 10px 22px; border-radius: 10px; font-family: var(--sans); font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all .18s; }
  .btn-primary { background: linear-gradient(135deg,#1a6bb5,#3ab26e); color: white; box-shadow: 0 4px 16px rgba(26,107,181,.4); }
  .btn-primary:hover { transform: translateY(-1px); }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--accent1); }
  .btn-hint { background: rgba(245,158,11,.1); color: var(--amber); border: 1px solid rgba(245,158,11,.3); }
  .results-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 36px 28px; text-align: center; animation: slideIn .35s cubic-bezier(.4,0,.2,1); }
  .results-score { font-family: var(--mono); font-size: 64px; font-weight: 700; background: linear-gradient(135deg,#60a5fa,#3ab26e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; margin: 16px 0; }
  .results-label { font-size: 14px; color: var(--muted); margin-bottom: 8px; }
  .results-grade { display: inline-block; padding: 6px 20px; border-radius: 99px; font-size: 18px; font-weight: 700; margin-bottom: 28px; }
  .grade-A { background: rgba(58,178,110,.15); color: var(--green); border: 1px solid rgba(58,178,110,.3); }
  .grade-B { background: rgba(245,158,11,.15); color: var(--amber); border: 1px solid rgba(245,158,11,.3); }
  .grade-C { background: rgba(239,68,68,.15);  color: var(--red);   border: 1px solid rgba(239,68,68,.3); }
  .results-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin: 24px 0; }
  .res-stat { padding: 16px 12px; border-radius: 12px; background: rgba(255,255,255,.04); border: 1px solid var(--border); }
  .res-stat-val { font-family: var(--mono); font-size: 28px; font-weight: 700; }
  .res-stat-lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .res-stat.c .res-stat-val { color: var(--green); }
  .res-stat.w .res-stat-val { color: var(--red); }
  .res-stat.t .res-stat-val { color: var(--amber); }
  .back-btn { margin-top: 16px; padding: 12px 28px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border); color: var(--muted); font-family: var(--sans); font-size: 14px; cursor: pointer; transition: all .18s; }
  .back-btn:hover { color: var(--text); border-color: var(--accent1); }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--card); border: 1px solid var(--border); padding: 10px 20px; border-radius: 10px; font-size: 14px; box-shadow: 0 8px 32px rgba(0,0,0,.4); transition: transform .3s cubic-bezier(.4,0,.2,1); z-index: 100; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  @media (max-width:520px) { .results-grid{grid-template-columns:repeat(2,1fr)} .q-text{font-size:16px} .chapter-grid{grid-template-columns:1fr 1fr} }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div id="app">
  <header>
    <div class="logo-box">ΒΙΟ</div>
    <div class="header-text">
      <h1>Βιολογία Trainer</h1>
      <p id="subtitle">Επέλεξε κεφάλαιο</p>
    </div>
  </header>
  <div id="chapterSelect"></div>
  <div id="quizArea">
    <div class="controls-bar">
      <button class="ctrl-btn" onclick="backToChapters()">← Κεφάλαια</button>
      <button class="ctrl-btn" id="btnShuffle" onclick="toggleShuffle()">🔀 Τυχαία σειρά</button>
      <button class="ctrl-btn" id="btnFilter" onclick="cycleFilter()">▽ <span id="filterLabel">Όλες</span></button>
      <button class="ctrl-btn" onclick="resetSession()">↺ Επαναφορά</button>
    </div>
    <div class="progress-wrap">
      <div class="progress-top">
        <span class="progress-label">Πρόοδος</span>
        <span class="progress-counter" id="progressCounter">0 / 0</span>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-stats">
        <div class="stat correct">✓ <span id="statCorrect">0</span> Σωστές</div>
        <div class="stat wrong">✗ <span id="statWrong">0</span> Λάθος</div>
        <div class="stat time">⏱ <span id="statTime">0:00</span></div>
      </div>
    </div>
    <div id="questionArea"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const BIOLOGY_A_CH1 = [{"id": "A1_Q01", "topic": "Δομικά συστατικά πρωτεϊνών", "type": "mcq", "question": "Από πόσα διαφορετικά αμινοξέα οικοδομούνται όλες οι πρωτεΐνες των οργανισμών;", "options": ["α. 4", "β. 20", "γ. 64", "δ. 170"], "correct": "β", "answer": "Β. 20 διαφορετικά αμινοξέα — παρόλο που έχουν ανιχνευτεί πάνω από 170 αμινοξέα στη φύση, μόνο 20 αποτελούν συστατικά πρωτεϊνών.", "hint": "Σκέψου τον αριθμό που είναι κοινός για όλους τους οργανισμούς.", "difficulty": "Easy", "page": 22, "source": "Βιβλίο"}, {"id": "A1_Q02", "topic": "Δομή αμινοξέων", "type": "open", "question": "Από ποια τμήματα αποτελείται το μόριο ενός αμινοξέος; Τι διαφέρει μεταξύ των διαφορετικών αμινοξέων;", "answer": "Κάθε αμινοξύ έχει ένα ΣΤΑΘΕΡΟ τμήμα (άτομο H, αμινομάδα -NH2, καρβοξυλομάδα -COOH, ενωμένα στον ίδιο άνθρακα) και ένα ΜΕΤΑΒΛΗΤΟ τμήμα (πλευρική ομάδα R). Τα 20 αμινοξέα διαφέρουν μεταξύ τους στην πλευρική ομάδα R.", "hint": "Σταθερό = κοινό σε όλα. Μεταβλητό = η πλευρική ομάδα.", "difficulty": "Medium", "page": 22, "source": "Βιβλίο"}, {"id": "A1_Q03", "topic": "Σχηματισμός πεπτιδικού δεσμού", "type": "mcq", "question": "Η ένωση δύο αμινοξέων γίνεται με αντίδραση συμπύκνωσης. Τι αφαιρείται κατά αυτή την αντίδραση;", "options": ["α. Ένα μόριο CO2", "β. Ένα μόριο νερού (H2O)", "γ. Ένα μόριο NH3", "δ. Ένα ιόν H+"], "correct": "β", "answer": "Β. Αφαιρείται ένα μόριο νερού (H2O) — η καρβοξυλομάδα του ενός αμινοξέος ενώνεται με την αμινομάδα του επόμενου με αποβολή νερού, σχηματίζοντας πεπτιδικό δεσμό.", "hint": "Αντίδραση συμπύκνωσης = αποβολή μικρομορίου.", "difficulty": "Easy", "page": 22, "source": "Βιβλίο"}, {"id": "A1_Q04", "topic": "Πολυπεπτίδια", "type": "mcq", "question": "Πώς ονομάζονται τα πεπτίδια στα οποία ο αριθμός των αμινοξέων υπερβαίνει τα 50;", "options": ["α. Διπεπτίδια", "β. Τριπεπτίδια", "γ. Ολιγοπεπτίδια", "δ. Πολυπεπτίδια"], "correct": "δ", "answer": "Δ. Πολυπεπτίδια — αλυσίδες με περισσότερα από 50 αμινοξέα. Δύο αμινοξέα = διπεπτίδιο, τρία = τριπεπτίδιο.", "hint": "Πολυ- = πολλά (>50).", "difficulty": "Easy", "page": 22, "source": "Βιβλίο"}, {"id": "A1_Q05", "topic": "Επίπεδα οργάνωσης πρωτεΐνης", "type": "open", "question": "Πόσα επίπεδα οργάνωσης διακρίνουμε στα πρωτεϊνικά μόρια; Τι καθορίζει τη βιολογική δραστηριότητα μιας πρωτεΐνης;", "answer": "Τέσσερα επίπεδα οργάνωσης (πρωτοταγής, δευτεροταγής, τριτοταγής, τεταρτοταγής δομή). Τη βιολογική δραστηριότητα καθορίζει η τελική τρισδιάστατη διαμόρφωση της πρωτεΐνης στο χώρο (κυρίως τριτοταγής δομή).", "hint": "Η πρωτεΐνη πρέπει να πάρει την τελική διαμόρφωσή της για να είναι λειτουργική.", "difficulty": "Medium", "page": 23, "source": "Βιβλίο"}, {"id": "A1_Q06", "topic": "Ποικιλομορφία πρωτεϊνών", "type": "open", "question": "Πώς είναι δυνατό να δημιουργούνται χιλιάδες διαφορετικές πρωτεΐνες από μόνο 20 αμινοξέα;", "answer": "Τα 20 αμινοξέα μπορούν να τοποθετηθούν σε διαφορετικό αριθμό και διαφορετική αλληλουχία, δίνοντας τεράστιο αριθμό συνδυασμών — ακριβώς όπως τα 24 γράμματα του αλφάβητου δίνουν χιλιάδες λέξεις.", "hint": "Η αναλογία με το αλφάβητο: γράμματα = αμινοξέα, λέξεις = πρωτεΐνες.", "difficulty": "Easy", "page": 22, "source": "Βιβλίο"}, {"id": "A1_Q07", "topic": "Λειτουργίες πρωτεϊνών", "type": "mcq", "question": "Ποιος από τους παρακάτω ρόλους ΔΕΝ αποτελεί λειτουργία των πρωτεϊνών;", "options": ["α. Δομικός ρόλος (π.χ. κολλαγόνο)", "β. Καταλυτικός ρόλος (ένζυμα)", "γ. Μεταφορά γενετικής πληροφορίας από γενιά σε γενιά", "δ. Μεταφορά ουσιών (π.χ. αιμοσφαιρίνη)"], "correct": "γ", "answer": "Γ. Η μεταφορά γενετικής πληροφορίας από γενιά σε γενιά γίνεται από το DNA, όχι τις πρωτεΐνες. Οι πρωτεΐνες έχουν δομικό, καταλυτικό, μεταφορικό, αμυντικό και ορμονικό ρόλο.", "hint": "Ποια λειτουργία ανήκει στο DNA και όχι στις πρωτεΐνες;", "difficulty": "Medium", "page": 22, "source": "Βιβλίο"}, {"id": "A1_Q08", "topic": "Πεπτιδικός δεσμός", "type": "fill_blank", "question": "Ο δεσμός που σχηματίζεται μεταξύ δύο αμινοξέων ονομάζεται ____. Σχηματίζεται μεταξύ της ____ ομάδας του ενός και της ____ ομάδας του επόμενου αμινοξέος.", "answer": "Πεπτιδικός δεσμός. Σχηματίζεται μεταξύ της καρβοξυλομάδας (-COOH) του ενός και της αμινομάδας (-NH2) του επόμενου αμινοξέος.", "hint": "Καρβοξυλο- + αμινο- = πεπτιδικός.", "difficulty": "Easy", "page": 22, "source": "Βιβλίο"}];
const BIOLOGY_A_CH2 = [{"id": "A2_Q01", "topic": "Πυρήνας", "type": "open", "question": "Ποιες είναι οι κύριες λειτουργίες του πυρήνα στο ευκαρυωτικό κύτταρο;", "answer": "α) Φυλάσσει το γενετικό υλικό (DNA) και ελέγχει όλες τις κυτταρικές δραστηριότητες. β) Είναι το οργανίδιο όπου διπλασιάζεται το γενετικό υλικό. γ) Είναι ο τόπος σύνθεσης των διαφόρων ειδών RNA (μεταγραφή).", "hint": "Τρεις βασικές λειτουργίες: φύλαξη, αντιγραφή, μεταγραφή.", "difficulty": "Easy", "page": 60, "source": "Βιβλίο"}, {"id": "A2_Q02", "topic": "Πυρηνικός Φάκελος", "type": "open", "question": "Από τι αποτελείται ο πυρηνικός φάκελος και ποιος είναι ο ρόλος των πυρηνικών πόρων;", "answer": "Ο πυρηνικός φάκελος αποτελείται από δύο στοιχειώδεις μεμβράνες (εσωτερική και εξωτερική). Κατά διαστήματα παρουσιάζει πόρους, που σχηματίζονται από τη συνένωση των δύο μεμβρανών. Οι πυρηνικοί πόροι ελέγχουν τα μακρομόρια που ανταλλάσσονται μεταξύ πυρήνα και κυτταροπλάσματος.", "hint": "Διπλή μεμβράνη + πόροι για επικοινωνία.", "difficulty": "Medium", "page": 60, "source": "Βιβλίο"}, {"id": "A2_Q03", "topic": "Πυρηνίσκος", "type": "mcq", "question": "Στον πυρηνίσκο συντίθεται κυρίως:", "options": ["α. mRNA", "β. tRNA", "γ. rRNA", "δ. DNA"], "correct": "γ", "answer": "Γ. rRNA (ριβοσωμικό RNA) — ο πυρηνίσκος αποτελείται κυρίως από RNA και DNA, και σ' αυτόν συντίθεται το rRNA που αποτελεί συστατικό των ριβοσωμάτων.", "hint": "Πυρηνίσκος → ριβοσωμικό RNA → ριβοσώματα.", "difficulty": "Medium", "page": 60, "source": "Βιβλίο"}, {"id": "A2_Q04", "topic": "Αδρό Ενδοπλασματικό Δίκτυο", "type": "open", "question": "Τι είναι το αδρό ενδοπλασματικό δίκτυο και ποια είναι η λειτουργία του;", "answer": "Το αδρό ενδοπλασματικό δίκτυο φέρει ριβοσώματα στην εξωτερική επιφάνεια των μεμβρανών του. Στα ριβοσώματα γίνεται η πρωτεϊνοσύνθεση. Οι πρωτεΐνες εισέρχονται στο εσωτερικό των αγωγών του, όπου ενδέχεται να υποστούν τροποποιήσεις (π.χ. προσθήκη σακχάρων). Το αδρό ΕΔ και τα μιτοχόνδρια/χλωροπλάστες έχουν δικά τους ριβοσώματα και συνθέτουν ορισμένες πρωτεΐνες τους.", "hint": "Αδρό = έχει ριβοσώματα. Λείο = δεν έχει.", "difficulty": "Medium", "page": 61, "source": "Βιβλίο"}, {"id": "A2_Q05", "topic": "Χλωροπλάστες", "type": "open", "question": "Περιγράψτε τη δομή του χλωροπλάστη και αναφέρετε σε ποια κύτταρα βρίσκονται.", "answer": "Οι χλωροπλάστες βρίσκονται μόνο στα κύτταρα των πράσινων τμημάτων των φυτών. Περιβάλλονται από διπλή στοιχειώδη μεμβράνη. Στο εσωτερικό υπάρχει το στρώμα (ρευστή μάζα), μέσα στο οποίο βρίσκονται θυλακοειδή που στοιβάζονται σε σωρούς (grana) και ελασμάτια. Στο στρώμα υπάρχουν DNA, ένζυμα και ριβοσώματα. Σ' αυτούς γίνεται η φωτοσύνθεση.", "hint": "Διπλή μεμβράνη, στρώμα, grana (θυλακοειδή), χλωροφύλλη, DNA.", "difficulty": "Medium", "page": 64, "source": "Βιβλίο"}, {"id": "A2_Q06", "topic": "Μιτοχόνδρια", "type": "open", "question": "Σε ποια κύτταρα βρίσκονται τα μιτοχόνδρια και ποια είναι η λειτουργία τους; Ποια ομοιότητα έχουν με τους χλωροπλάστες;", "answer": "Τα μιτοχόνδρια βρίσκονται σε όλα τα ευκαρυωτικά κύτταρα (εκτός ώριμων ερυθρών αιμοσφαιρίων). Είναι τα οργανίδια όπου γίνεται η κυτταρική αναπνοή (μετατροπή ενέργειας). Ομοιότητες με χλωροπλάστες: διπλή μεμβράνη, DNA, ριβοσώματα, γενετική αυτοδυναμία, ικανότητα διαίρεσης.", "hint": "Μιτοχόνδρια = 'εργοστάσια ενέργειας'. Υπάρχουν παντού εκτός ΕΑΑ.", "difficulty": "Medium", "page": 65, "source": "Βιβλίο"}, {"id": "A2_Q07", "topic": "Γενετική Αυτοδυναμία Οργανιδίων", "type": "open", "question": "Γιατί λέμε ότι χλωροπλάστες και μιτοχόνδρια έχουν 'σχετική γενετική αυτοδυναμία';", "answer": "Γιατί περιέχουν δικό τους DNA, ριβοσώματα και ένζυμα. Με αυτόν τον εξοπλισμό μπορούν να παράγουν ορισμένες πρωτεΐνες τους και να διπλασιάζονται ανεξάρτητα από τον διπλασιασμό του κυττάρου. Δεν εξαρτώνται ολοκληρωτικά από το γενετικό υλικό του πυρήνα.", "hint": "Δικό τους DNA + ριβοσώματα = μπορούν να λειτουργούν μερικώς ανεξάρτητα.", "difficulty": "Hard", "page": 65, "source": "Βιβλίο"}, {"id": "A2_Q08", "topic": "Προκαρυωτικά vs Ευκαρυωτικά", "type": "mcq", "question": "Ποια από τις παρακάτω δομές απουσιάζει από τα προκαρυωτικά κύτταρα;", "options": ["α. Ριβοσώματα", "β. DNA", "γ. Πυρηνικός φάκελος", "δ. Κυτταρική μεμβράνη"], "correct": "γ", "answer": "Γ. Πυρηνικός φάκελος — τα προκαρυωτικά δεν έχουν μεμβρανοπεριβαλλόμενο πυρήνα. Το DNA τους βρίσκεται ελεύθερο στο κυτταρόπλασμα. Έχουν όμως ριβοσώματα, DNA και κυτταρική μεμβράνη.", "hint": "Προκαρυωτικό = χωρίς 'πραγματικό' πυρήνα.", "difficulty": "Easy", "page": 60, "source": "Βιβλίο"}, {"id": "A2_Q09", "topic": "Ερυθρά Αιμοσφαίρια", "type": "open", "question": "Γιατί τα ώριμα ερυθρά αιμοσφαίρια δεν αναπαράγονται; Τι άλλο χαρακτηριστικό έχουν;", "answer": "Τα ώριμα ερυθρά αιμοσφαίρια χάνουν τον πυρήνα τους κατά τη διαφοροποίησή τους. Χωρίς πυρήνα δεν μπορούν να αναπαραχθούν και εμφανίζουν μειωμένες κυτταρικές δραστηριότητες. Επίσης δεν έχουν μιτοχόνδρια.", "hint": "Χωρίς πυρήνα = δεν διαιρούνται. Χωρίς μιτοχόνδρια = δεν κάνουν αερόβια αναπνοή.", "difficulty": "Medium", "page": 60, "source": "Βιβλίο"}];
const BIOLOGY_A_CH3 = [{"id": "A3_Q01", "topic": "Ενέργεια Ενεργοποίησης", "type": "open", "question": "Τι είναι η ενέργεια ενεργοποίησης και πώς τη μειώνουν τα ένζυμα;", "answer": "Ενέργεια ενεργοποίησης είναι η ενέργεια που πρέπει αρχικά να προσφερθεί στα αντιδρώντα μόρια για να ξεκινήσει μια χημική αντίδραση. Τα ένζυμα προσανατολίζουν κατάλληλα τα μόρια-υποστρώματα ώστε να αλληλεπιδρούν αποτελεσματικά, μειώνοντας έτσι την απαιτούμενη ενέργεια ενεργοποίησης.", "hint": "Ενέργεια ενεργοποίησης = το 'εμπόδιο' που πρέπει να ξεπεραστεί.", "difficulty": "Medium", "page": 82, "source": "Βιβλίο"}, {"id": "A3_Q02", "topic": "Ενεργό Κέντρο", "type": "open", "question": "Τι είναι το ενεργό κέντρο ενός ενζύμου και πώς αλληλεπιδρά με το υπόστρωμα;", "answer": "Το ενεργό κέντρο είναι μια μικρή περιοχή του ενζύμου, όπου γίνεται η πρόσδεση του υποστρώματος. Η σύνδεση μοιάζει με το 'ταίριασμα του κλειδιού στην κλειδαριά' — το ενεργό κέντρο έχει σχήμα συμπληρωματικό με το υπόστρωμα. Η πρόσδεση αποσταθεροποιεί τους δεσμούς του υποστρώματος, διευκολύνοντας τη χημική αντίδραση.", "hint": "Κλειδί-κλειδαριά: ένζυμο-υπόστρωμα.", "difficulty": "Easy", "page": 82, "source": "Βιβλίο"}, {"id": "A3_Q03", "topic": "Ταχύτητα Ενζύμων", "type": "mcq", "question": "Κατά πόσο αυξάνουν τα ένζυμα την ταχύτητα των αντιδράσεων;", "options": ["α. 10 έως 100 φορές", "β. 1.000 έως 10.000 φορές", "γ. Μέχρι 100 εκατομμύρια φορές", "δ. Μέχρι 2 φορές"], "correct": "γ", "answer": "Γ. Μέχρι 100 εκατομμύρια φορές — αντιδράσεις που θα χρειάζονταν 32 μήνες χωρίς ένζυμο, ολοκληρώνονται σε ένα λεπτό με ένζυμο.", "hint": "Τυπικά 10⁶ έως 10¹² φορές — πολύ μεγάλη επιτάχυνση.", "difficulty": "Medium", "page": 82, "source": "Βιβλίο"}, {"id": "A3_Q04", "topic": "Ιδιότητες Ενζύμων - Αναλλοίωτα", "type": "mcq", "question": "Τι συμβαίνει με το ένζυμο μετά το τέλος της αντίδρασης που καταλύει;", "options": ["α. Καταστρέφεται", "β. Παραμένει αναλλοίωτο και μπορεί να ξαναχρησιμοποιηθεί", "γ. Μετατρέπεται σε προϊόν", "δ. Διασπάται σε αμινοξέα"], "correct": "β", "answer": "Β. Παραμένει αναλλοίωτο — τα ένζυμα δεν καταναλώνονται στην αντίδραση που καταλύουν. Μετά το τέλος της αντίδρασης μπορούν να ξαναχρησιμοποιηθούν πολλές φορές.", "hint": "Καταλύτης = δεν καταναλώνεται.", "difficulty": "Easy", "page": 84, "source": "Βιβλίο"}, {"id": "A3_Q05", "topic": "Εξειδίκευση Ενζύμων", "type": "open", "question": "Τι σημαίνει ότι τα ένζυμα εμφανίζουν 'υψηλό βαθμό εξειδίκευσης'; Δώστε παράδειγμα.", "answer": "Εξειδίκευση σημαίνει ότι κάθε ένζυμο δρα συνήθως σε ένα μόνο συγκεκριμένο υπόστρωμα ή σε μια σειρά πολύ συγγενικών αντιδράσεων. Αυτό οφείλεται στη διάταξη του ενεργού κέντρου. Παράδειγμα: η καταλάση καταλύει μόνο τη διάσπαση του υπεροξειδίου υδρογόνου (2Η2Ο2 → 2Η2Ο + Ο2).", "hint": "Ένα ένζυμο = ένα υπόστρωμα (ή λίγα συγγενικά).", "difficulty": "Medium", "page": 84, "source": "Βιβλίο"}, {"id": "A3_Q06", "topic": "Παράγοντες που Επηρεάζουν Ένζυμα", "type": "open", "question": "Ποιοι παράγοντες επηρεάζουν τη δραστικότητα των ενζύμων; Γιατί τα επηρεάζουν αυτοί οι παράγοντες;", "answer": "Η δραστικότητα επηρεάζεται από: θερμοκρασία, pH, συγκέντρωση υποστρώματος, παρουσία αναστολέων. Τα ένζυμα επηρεάζονται γιατί είναι πρωτεΐνες — έχουν συγκεκριμένη τριτοταγή δομή που είναι απαραίτητη για τη λειτουργικότητά τους. Υψηλή θερμοκρασία ή ακραίο pH αλλοιώνει τη δομή (αποδιάταξη) και η καταλυτική δράση χάνεται.", "hint": "Ένζυμα = πρωτεΐνες → ευαίσθητα στη θερμοκρασία και το pH.", "difficulty": "Medium", "page": 84, "source": "Βιβλίο"}, {"id": "A3_Q07", "topic": "Απώλεια Καταλυτικής Δράσης", "type": "open", "question": "Υπό ποιες συνθήκες χάνει το ένζυμο την καταλυτική του δράση;", "answer": "Το ένζυμο χάνει την καταλυτική του δράση όταν η τριτοταγής δομή του (διάταξη στο χώρο) αλλοιωθεί — δηλαδή όταν αποδιαταχθεί. Αυτό μπορεί να συμβεί με υψηλή θερμοκρασία, ακραίο pH, ή άλλες συνθήκες που αλλοιώνουν τη δομή της πρωτεΐνης.", "hint": "Τριτοταγής δομή = απαραίτητη για λειτουργία. Αποδιάταξη = απώλεια δράσης.", "difficulty": "Medium", "page": 84, "source": "Βιβλίο"}, {"id": "A3_Q08", "topic": "Ενδο/Εξωκυτταρικά Ένζυμα", "type": "mcq", "question": "Τα ένζυμα που εκκρίνονται και δρουν εκτός κυττάρου (π.χ. στο στομάχι) ονομάζονται:", "options": ["α. Ενδοκυτταρικά", "β. Εξωκυτταρικά", "γ. Αναστολείς", "δ. Συνένζυμα"], "correct": "β", "answer": "Β. Εξωκυτταρικά — δρουν εκτός κυττάρου, σε κοιλότητες όπως το στομάχι. Ενδοκυτταρικά είναι αυτά που δρουν μέσα στο κύτταρο.", "hint": "Εξω- = έξω από το κύτταρο.", "difficulty": "Easy", "page": 84, "source": "Βιβλίο"}];
const BIOLOGY_A_CH4 = [{"id": "A4_Q01", "topic": "Κύκλος Ζωής Κυττάρου", "type": "open", "question": "Τι είναι ο κυτταρικός κύκλος και ποιες είναι οι κύριες φάσεις του;", "answer": "Ο κυτταρικός κύκλος είναι η ακολουθία γεγονότων από τη δημιουργία ενός κυττάρου έως την επόμενη διαίρεσή του. Αποτελείται από: Μεσόφαση (G1, S, G2) — όπου γίνεται αύξηση του κυττάρου και αντιγραφή DNA — και Μίτωση (Μ φάση) — όπου γίνεται η κυτταρική διαίρεση.", "hint": "Μεσόφαση (μεγαλύτερο τμήμα) + Μίτωση.", "difficulty": "Medium", "page": 122, "source": "Βιβλίο"}, {"id": "A4_Q02", "topic": "Μίτωση - Ορισμός", "type": "mcq", "question": "Η μίτωση είναι ο βασικός τύπος διαίρεσης των ευκαρυωτικών κυττάρων. Ποιο αποτέλεσμα παράγει;", "options": ["α. Δύο απλοειδή θυγατρικά κύτταρα", "β. Τέσσερα απλοειδή θυγατρικά κύτταρα", "γ. Δύο διπλοειδή γενετικά πανομοιότυπα θυγατρικά κύτταρα", "δ. Τέσσερα διπλοειδή θυγατρικά κύτταρα"], "correct": "γ", "answer": "Γ. Δύο διπλοειδή γενετικά πανομοιότυπα θυγατρικά κύτταρα — η μίτωση εξασφαλίζει ακριβοδίκαιη διανομή του γενετικού υλικού, ώστε κάθε θυγατρικό να έχει τον ίδιο αριθμό χρωμοσωμάτων με το μητρικό.", "hint": "Μίτωση = γενετική σταθερότητα, ίδιος αριθμός χρωμοσωμάτων.", "difficulty": "Easy", "page": 134, "source": "Βιβλίο"}, {"id": "A4_Q03", "topic": "Στάδια Μίτωσης", "type": "ordering", "question": "Να αναφέρετε τα τέσσερα στάδια της πυρηνικής διαίρεσης (μίτωσης) με τη σωστή σειρά και να αναφέρετε το κύριο χαρακτηριστικό κάθε σταδίου.", "answer": "1) ΠΡΟΦΑΣΗ: Συμπύκνωση χρωματίνης → χρωμοσώματα, σχηματισμός ατράκτου, αποδιοργάνωση πυρηνικού φακέλου. 2) ΜΕΤΑΦΑΣΗ: Τα χρωμοσώματα στο ισημερινό επίπεδο. 3) ΑΝΑΦΑΣΗ: Διαχωρισμός αδελφών χρωματίδων, κινούνται προς τους πόλους. 4) ΤΕΛΟΦΑΣΗ: Επανεμφάνιση πυρηνικών φακέλων, αποσυμπύκνωση χρωμοσωμάτων.", "hint": "Πρό-Μετά-Ανά-Τελό: σκέψου τι συμβαίνει στα χρωμοσώματα σε κάθε στάδιο.", "difficulty": "Medium", "page": 135, "source": "Βιβλίο"}, {"id": "A4_Q04", "topic": "Πρόφαση", "type": "open", "question": "Ποιο είναι το μεγαλύτερο σε διάρκεια στάδιο της μίτωσης και τι συμβαίνει σε αυτό;", "answer": "Η ΠΡΟΦΑΣΗ είναι το μεγαλύτερο στάδιο. Σε αυτή: τα ινίδια χρωματίνης συμπυκνώνονται σε χρωμοσώματα (κάθε χρωμόσωμα = 2 αδελφές χρωματίδες ενωμένες στο κεντρομερίδιο), σχηματίζεται η άτρακτος (από κεντροσωμάτια στα ζωικά κύτταρα), αποδιοργανώνονται ο πυρηνικός φάκελος και ο πυρηνίσκος.", "hint": "Πρόφαση = προετοιμασία για διαίρεση.", "difficulty": "Medium", "page": 135, "source": "Βιβλίο"}, {"id": "A4_Q05", "topic": "Βιολογική Σημασία Μίτωσης", "type": "open", "question": "Ποια είναι η βιολογική σημασία της μίτωσης; Αναφέρετε τρεις βασικές λειτουργίες.", "answer": "1) Μονογονική αναπαραγωγή μονοκύτταρων και πολυκύτταρων οργανισμών. 2) Ανάπτυξη πολυκύτταρων οργανισμών (αύξηση αριθμού κυττάρων). 3) Αντικατάσταση νεκρών/κατεστραμμένων κυττάρων στους ιστούς. Σε όλες αυτές τις περιπτώσεις τα θυγατρικά κύτταρα είναι γενετικά ταυτόσημα με το μητρικό.", "hint": "Αναπαραγωγή, ανάπτυξη, ανανέωση — τα τρία Α.", "difficulty": "Medium", "page": 138, "source": "Βιβλίο"}, {"id": "A4_Q06", "topic": "Μείωση - Αναγκαιότητα", "type": "open", "question": "Γιατί είναι αναγκαία η μείωση στους αμφιγονικά αναπαραγόμενους οργανισμούς;", "answer": "Στην αμφιγονική αναπαραγωγή συνενώνονται δύο γαμέτες. Αν κάθε γαμέτης μετέφερε τον πλήρη αριθμό χρωμοσωμάτων, ο απόγονος θα είχε διπλάσιο αριθμό. Η μείωση παράγει γαμέτες με το μισό αριθμό χρωμοσωμάτων (απλοειδείς). Με τη γονιμοποίηση αποκαθίσταται ο φυσιολογικός αριθμός.", "hint": "Μείωση + γονιμοποίηση = σταθερός αριθμός χρωμοσωμάτων στο είδος.", "difficulty": "Hard", "page": 140, "source": "Βιβλίο"}, {"id": "A4_Q07", "topic": "Μείωση - Αποτέλεσμα", "type": "mcq", "question": "Η μείωση παράγει:", "options": ["α. 2 διπλοειδή κύτταρα", "β. 4 διπλοειδή κύτταρα", "γ. 2 απλοειδή κύτταρα", "δ. 4 απλοειδή κύτταρα"], "correct": "δ", "answer": "Δ. 4 απλοειδή κύτταρα — η μείωση περιλαμβάνει δύο διαδοχικές διαιρέσεις (Μείωση Ι και ΙΙ) από ένα διπλοειδές κύτταρο, δίνοντας 4 απλοειδή κύτταρα (γαμέτες).", "hint": "2 διαιρέσεις → 4 κύτταρα. Απλοειδή = n χρωμοσώματα.", "difficulty": "Easy", "page": 140, "source": "Βιβλίο"}, {"id": "A4_Q08", "topic": "Μίτωση vs Μείωση", "type": "open", "question": "Συγκρίνετε μίτωση και μείωση ως προς: α) αριθμό διαιρέσεων, β) αποτέλεσμα, γ) πού γίνεται.", "answer": "ΜΙΤΩΣΗ: α) 1 διαίρεση, β) 2 διπλοειδή γενετικά ταυτόσημα κύτταρα, γ) σε όλα τα σωματικά κύτταρα. ΜΕΙΩΣΗ: α) 2 διαδοχικές διαιρέσεις, β) 4 απλοειδή κύτταρα (γαμέτες) με γενετική ποικιλότητα, γ) μόνο στα γεννητικά όργανα για παραγωγή γαμετών.", "hint": "Μίτωση = ανάπτυξη/επιδιόρθωση. Μείωση = παραγωγή γαμετών.", "difficulty": "Hard", "page": 140, "source": "Βιβλίο"}, {"id": "A4_Q09", "topic": "Πρώτη Μειωτική Διαίρεση", "type": "open", "question": "Τι συμβαίνει κατά την Ανάφαση Ι της μείωσης; Πώς διαφέρει από την Ανάφαση της μίτωσης;", "answer": "ΑΝΑΦΑΣΗ Ι: Διαχωρίζονται τα ΟΜΟΛΟΓΑ χρωμοσώματα (το καθένα αποτελείται ακόμα από 2 χρωματίδες). ΑΝΑΦΑΣΗ ΜΙΤΩΣΗΣ: Διαχωρίζονται οι ΑΔΕΛΦΕΣ ΧΡΩΜΑΤΙΔΕΣ κάθε χρωμοσώματος. Στη μείωση Ι ο αριθμός χρωμοσωμάτων υποδιπλασιάζεται, στη μίτωση παραμένει ίδιος.", "hint": "Μείωση Ι → χωρίζουν ομόλογα. Μίτωση → χωρίζουν αδελφές χρωματίδες.", "difficulty": "Hard", "page": 140, "source": "Βιβλίο"}, {"id": "A4_Q10", "topic": "Κυτταροπλασματική Διαίρεση", "type": "open", "question": "Τι είναι η κυτταροπλασματική διαίρεση και πότε συμβαίνει;", "answer": "Η κυτταροπλασματική διαίρεση είναι η διαδικασία κατά την οποία το κυτταρόπλασμα του μητρικού κυττάρου μοιράζεται στα δύο θυγατρικά κύτταρα. Συμβαίνει κατά τη διάρκεια ή μετά την τελόφαση της μίτωσης. Στα ζωικά κύτταρα γίνεται με σχηματισμό δακτυλίου, στα φυτικά με σχηματισμό φραγμοπλάστη.", "hint": "Χωρίς κυτταροπλασματική διαίρεση θα είχαμε ένα κύτταρο με 2 πυρήνες.", "difficulty": "Medium", "page": 137, "source": "Βιβλίο"}];
const BIOLOGY_CH1 = [{"id": "B1_Q01", "topic": "Δομή DNA", "type": "open", "question": "Το DNA σε δύο διαφορετικά κύτταρα ανθρώπου βρέθηκε ότι αποτελείται στο ένα από 3×10⁹ και στο άλλο από 6×10⁹ ζεύγη βάσεων. Πώς μπορεί να εξηγηθεί αυτό;", "answer": "Το ένα κύτταρο βρίσκεται στη φάση G1 (απλοειδής ή διπλοειδής ποσότητα DNA) και το άλλο έχει ήδη ολοκληρώσει την αντιγραφή του DNA (φάση G2/S), οπότε η ποσότητα έχει διπλασιαστεί.", "hint": "Σκέψου σε ποια φάση του κυτταρικού κύκλου βρίσκεται το κάθε κύτταρο.", "difficulty": "Medium", "page": 27, "source": "Βιβλίο"}, {"id": "B1_Q02", "topic": "Φωσφοδιεστερικός Δεσμός", "type": "mcq", "question": "Με ποιον τρόπο συνδέεται κάθε νουκλεοτίδιο με το αμέσως επόμενό του στην πολυνουκλεοτιδική αλυσίδα του DNA;", "options": ["α. Η φωσφορική ομάδα του ενός με την αζωτούχο βάση του επόμενου.", "β. Η φωσφορική ομάδα του ενός με τη δεοξυριβόζη του επόμενου.", "γ. Η αζωτούχος βάση του ενός με τη δεοξυριβόζη του επόμενου.", "δ. Οι αζωτούχες βάσεις δύο συνεχόμενων νουκλεοτιδίων με δεσμούς υδρογόνου.", "ε. Η δεοξυριβόζη του ενός με τη φωσφορική ομάδα του επόμενου."], "correct": "ε", "answer": "Ε. Η δεοξυριβόζη του ενός νουκλεοτιδίου (3' άνθρακας) με τη φωσφορική ομάδα του επόμενου (5' άνθρακας). Αυτός ο δεσμός ονομάζεται φωσφοδιεστερικός.", "hint": "Ο φωσφοδιεστερικός δεσμός σχηματίζεται μεταξύ σακχάρου και φωσφορικής ομάδας — όχι μεταξύ βάσεων.", "difficulty": "Hard", "page": 27, "source": "Βιβλίο"}, {"id": "B1_Q03", "topic": "Κανόνας Chargaff", "type": "calculation", "question": "Σε ένα μόριο DNA ευκαρυωτικού κυττάρου η αδενίνη αποτελεί το 20% των αζωτούχων βάσεών του. Σε ποιες αναλογίες (%) θα βρίσκεται η κάθε μία από τις υπόλοιπες αζωτούχες βάσεις;", "answer": "Α=20% → Τ=20% (συμπληρωματικότητα). Άρα Α+Τ=40%, οπότε G+C=60%, άρα G=C=30%.", "hint": "Α=Τ και G=C (κανόνας Chargaff). Ξεκίνα από εκεί.", "difficulty": "Medium", "page": 27, "source": "Βιβλίο"}, {"id": "B1_Q04", "topic": "Λειτουργίες Γενετικού Υλικού", "type": "open", "question": "Να αναφέρετε συνοπτικά τις λειτουργίες του γενετικού υλικού.", "answer": "1. Αποθήκευση της γενετικής πληροφορίας. 2. Έκφραση της πληροφορίας (μέσω πρωτεϊνοσύνθεσης). 3. Αντιγραφή και μεταβίβαση της πληροφορίας από γενιά σε γενιά.", "hint": "Τρεις βασικές λειτουργίες: αποθήκευση, έκφραση, μεταβίβαση.", "difficulty": "Easy", "page": 27, "source": "Βιβλίο"}, {"id": "B1_Q05", "topic": "Πείραμα Hershey-Chase", "type": "mcq", "question": "Επιστήμονες κατασκεύασαν έναν υβριδικό βακτηριοφάγο με πρωτεϊνικό κάλυμμα φάγου Τ2 και DNA φάγου Τ4. Όταν μολύνθηκε βακτήριο, οι απόγονοι φάγοι που παράχθηκαν είχαν:", "options": ["α. τις πρωτεΐνες του Τ2 και το DNA του Τ4", "β. τις πρωτεΐνες του Τ4 και το DNA του Τ2", "γ. μείγμα DNA και πρωτεϊνών και των δύο φάγων", "δ. τις πρωτεΐνες και το DNA του Τ2", "ε. τις πρωτεΐνες και το DNA του Τ4"], "correct": "ε", "answer": "Ε. Το DNA (φάγου Τ4) εισέρχεται στο βακτήριο και κατευθύνει την παραγωγή ΚΑΙ των πρωτεϊνών Τ4. Αυτό αποδεικνύει ότι το DNA φέρει τη γενετική πληροφορία.", "hint": "Ποιο μέρος του φάγου εισέρχεται στο βακτήριο; Αυτό καθορίζει τους απόγονους.", "difficulty": "Hard", "page": 27, "source": "Βιβλίο"}, {"id": "B1_Q06", "topic": "Πλασμίδια", "type": "open", "question": "Τι είναι τα πλασμίδια; Να αναφέρετε δύο σημαντικά είδη γονιδίων που εντοπίζονται σε αυτά.", "answer": "Τα πλασμίδια είναι μικρά κυκλικά μόρια DNA που βρίσκονται στα βακτήρια, ανεξάρτητα από το κύριο χρωμόσωμά τους. Περιέχουν συχνά: γονίδια ανθεκτικότητας σε αντιβιοτικά και γονίδια παραγωγής τοξινών.", "hint": "Πλασμίδια = μικρά κυκλικά DNA σε βακτήρια. Πολύ σημαντικά στη Βιοτεχνολογία.", "difficulty": "Easy", "page": 27, "source": "Βιβλίο"}, {"id": "B1_Q07", "topic": "Νουκλεοσώματα", "type": "mcq", "question": "Ποια από τις παρακάτω προτάσεις που αφορά τα νουκλεοσώματα είναι σωστή;", "options": ["α. Κατασκευάζονται από χρωμοσώματα", "β. Αποτελούνται αποκλειστικά από DNA", "γ. Αποτελούνται από DNA που τυλίγεται γύρω από πρωτεΐνες (ιστόνες)", "δ. Δημιουργούνται μόνο κατά την κυτταρική διαίρεση", "ε. Εμφανίζονται μόνο κατά τη μεσόφαση"], "correct": "γ", "answer": "Γ. Τα νουκλεοσώματα αποτελούνται από DNA (περίπου 146 ζεύγη βάσεων) τυλιγμένο γύρω από ένα οκταμερές ιστονών.", "hint": "Νουκλεόσωμα = DNA + ιστόνες. Είναι η βασική μονάδα οργάνωσης της χρωματίνης.", "difficulty": "Medium", "page": 27, "source": "Βιβλίο"}, {"id": "B1_Q08", "topic": "Δομή Χρωμοσώματος", "type": "ordering", "question": "Να τοποθετήσετε κατά μέγεθος (ανάλογα με την ποσότητα του γενετικού υλικού) από το μικρότερο στο μεγαλύτερο: Χρωμόσωμα, νουκλεοτίδιο, γονίδιο, νουκλεόσωμα.", "answer": "Νουκλεοτίδιο < Νουκλεόσωμα < Γονίδιο < Χρωμόσωμα. (Ένα μέσο γονίδιο = ~1.000 ζεύγη βάσεων, ένα νουκλεόσωμα = ~200 ζεύγη βάσεων)", "hint": "Το νουκλεοτίδιο είναι η μικρότερη μονάδα. Το χρωμόσωμα περιέχει χιλιάδες γονίδια.", "difficulty": "Medium", "page": 27, "source": "Βιβλίο"}, {"id": "B1_Q09", "topic": "DNA Μιτοχονδρίων", "type": "fill_blank", "question": "Συμπληρώστε σωστά: Το γενετικό υλικό των μιτοχονδρίων είναι [μονόκλωνο / δίκλωνο] μόριο [DNA / RNA], συνήθως [γραμμικό / κυκλικό] και περιέχει γενετικές πληροφορίες για [όλες / μερικές από] τις λειτουργίες του.", "answer": "Δίκλωνο μόριο DNA, συνήθως κυκλικό, και περιέχει πληροφορίες για μερικές από τις λειτουργίες του μιτοχονδρίου.", "hint": "Τα μιτοχόνδρια έχουν δική τους γενετική πληροφορία, αλλά όχι πλήρη.", "difficulty": "Easy", "page": 27, "source": "Βιβλίο"}, {"id": "B1_Q10", "topic": "Πείραμα Acetabularia", "type": "open", "question": "Στο πείραμα με την Acetabularia, το καπέλο που σχηματίστηκε καθορίστηκε από τη βάση και όχι από τον μίσχο. Ποια συμπεράσματα βγαίνουν;", "answer": "Το γενετικό υλικό βρίσκεται στον πυρήνα (στη βάση του οργανισμού) και αυτό καθορίζει τα χαρακτηριστικά του οργανισμού — ακόμα και όταν συνδέεται με τμήμα διαφορετικού είδους.", "hint": "Πού βρίσκεται ο πυρήνας της Acetabularia; Αυτό εξηγεί το αποτέλεσμα.", "difficulty": "Hard", "page": 27, "source": "Βιβλίο"}, {"id": "PAN_CH1  "Γ. 80%. Αν Α+Τ=20% στο DNA, τότε G+C=80% στο DNA. Το RNA αντιγράφει συμπληρωματικά μία αλυσίδα, οπότε G+C=80% και στο RNA.", "hint": "Σε δίκλωνο DNA: (Α+Τ) + (G+C) = 100%. Το RNA αντιγράφει τη μη κωδική αλυσίδα.", "difficulty": "Hard", "page": 43, "source": "Βιβλίο"}, {"id": "B2_Q05", "topic": "Συμπληρωματικότητα στη Ροή Πληροφορίας", "type": "open", "question": "Σε ποια στάδια της ροής της γενετικής πληροφορίας βρίσκει εφαρμογή η συμπληρωματικότητα των βάσεων;", "answer": "Σε όλα τα στάδια: 1) Αντιγραφή DNA (σύνθεση νέας αλυσίδας). 2) Μεταγραφή (σύνθεση RNA από DNA). 3) Μετάφραση (αντικωδικόνιο tRNA - κωδικόνιο mRNA).", "hint": "Σκέψου αντιγραφή, μεταγραφή, μετάφραση — σε ποιο από αυτά χρειάζεται ζευγάρωμα βάσεων;", "difficulty": "Medium", "page": 43, "source": "Βιβλίο"}, {"id": "B2_Q06", "topic": "Αλληλουχία Βάσεων & Γενετικός Κώδικας", "type": "calculation", "question": "Τμήμα μη κωδικής αλυσίδας βακτηριακού DNA: 3'-TAC TGC ATA ATG ATT-5'. Ποια είναι η αλληλουχία των κωδικονίων του mRNA;", "answer": "Κωδική αλυσίδα DNA: 5'-ATG ACG TAT TAC TAA-3'. mRNA: 5'-AUG ACG UAU UAC UAA-3'. Κωδικόνια: AUG (Μεθειονίνη-έναρξη), ACG (Θρεονίνη), UAU (Τυροσίνη), UAC (Τυροσίνη), UAA (λήξη).", "hint": "Βήμα 1: Γράψε τη συμπληρωματική (κωδική) αλυσίδα DNA. Βήμα 2: Το mRNA έχει ίδια αλληλουχία με κωδική, αλλά U αντί T.", "difficulty": "Hard", "page": 43, "source": "Βιβλίο"}, {"id": "B2_Q07", "topic": "Αιμοσφαιρίνη & Πρωτεϊνοσύνθεση", "type": "calculation", "question": "Η αιμοσφαιρίνη Α αποτελείται από 2 αλυσίδες α (141 αα) και 2 β (146 αα). Πόσα είδη mRNA είναι υπεύθυνα; Από πόσες βάσεις αποτελείται το mRNA για τις β-αλυσίδες;", "answer": "2 είδη mRNA (ένα για τις α και ένα για τις β αλυσίδες). Για τις β: 146 αμινοξέα × 3 βάσεις = 438 βάσεις (χωρίς το κωδικόνιο λήξης).", "hint": "Κάθε διαφορετική αλυσίδα = διαφορετικό mRNA. Κωδικόνιο = 3 βάσεις = 1 αμινοξύ.", "difficulty": "Medium", "page": 43, "source": "Βιβλίο"}, {"id": "B2_Q08", "topic": "Καθολικότητα Γενετικού Κώδικα", "type": "open", "question": "Από πρόδρομα ερυθρά αιμοσφαίρια απομονώνουμε mRNA που κωδικοποιεί τη β-αλυσίδα αιμοσφαιρίνης. Το βάζουμε σε εκχύλισμα βακτηριακών κυττάρων και παρατηρούμε σύνθεση β-αλυσίδων. Εξηγήστε.", "answer": "Ο γενετικός κώδικας είναι σχεδόν καθολικός — τα βακτήρια και ο άνθρωπος χρησιμοποιούν τον ίδιο κώδικα. Τα βακτηριακά ριβοσώματα/tRNA/αμινοξέα μπορούν να μεταφράσουν οποιοδήποτε mRNA.", "hint": "Γιατί μπορούν τα βακτήρια να παράγουν ανθρώπινες πρωτεΐνες; Αυτό αξιοποιείται στη Βιοτεχνολογία.", "difficulty": "Medium", "page": 43, "source": "Βιβλίο"}, {"id": "B2_Q09", "topic": "Οπερόνιο Λακτόζης", "type": "mcq", "question": "Στο οπερόνιο της λακτόζης ο καταστολέας προσδένεται:", "options": ["α. στον υποκινητή", "β. στην αρχή του πρώτου γονιδίου", "γ. στο χειριστή", "δ. στο mRNA", "ε. στο ρυθμιστικό γονίδιο"], "correct": "γ", "answer": "Γ. Ο καταστολέας προσδένεται στο χειριστή (operator) και εμποδίζει την RNA πολυμεράση να ξεκινήσει τη μεταγραφή.", "hint": "Ο χειριστής είναι ο 'διακόπτης' του οπερονίου — βρίσκεται μεταξύ υποκινητή και δομικών γονιδίων.", "difficulty": "Easy", "page": 47, "source": "Βιβλίο"}, {"id": "B2_Q10", "topic": "Εξώνια - Εσώνια", "type": "mcq", "question": "Στους ευκαρυωτικούς οργανισμούς η περιοχή του γονιδίου που μεταφράζεται είναι:", "options": ["α. το οπερόνιο", "β. ο υποκινητής", "γ. ο χειριστής", "δ. τα εσώνια", "ε. τα εξώνια", "στ. ο καταστολέας"], "correct": "ε", "answer": "Ε. Τα εξώνια (exons) είναι οι κωδικοποιούσες περιοχές που παραμένουν στο ώριμο mRNA και μεταφράζονται. Τα εσώνια αφαιρούνται κατά την ωρίμανση.", "hint": "Εξ-ώνια = Εξ-έρχονται στο τελικό mRNA. Εσ-ώνια = Εσ-ωτερικές που αφαιρούνται.", "difficulty": "Easy", "page": 47, "source": "Βιβλίο"}, {"id": "B2_Q11", "topic": "Υποκινητής", "type": "mcq", "question": "Τι είναι ο υποκινητής;", "options": ["α. Περιοχή στην οποία προσδένεται ο καταστολέας", "β. Περιοχή που προσδένεται η RNA πολυμεράση", "γ. Γονίδιο που κωδικοποιεί την πρωτεΐνη καταστολέα", "δ. Ένα δομικό γονίδιο", "ε. Ένα οπερόνιο"], "correct": "β", "answer": "Β. Ο υποκινητής (promoter) είναι η αλληλουχία DNA στην οποία προσδένεται η RNA πολυμεράση για να ξεκινήσει τη μεταγραφή. Βρίσκεται πάντα πριν από την αρχή του γονιδίου.", "hint": "Ο υποκινητής 'υποκινεί' = ξεκινά τη μεταγραφή.", "difficulty": "Easy", "page": 47, "source": "Βιβλίο"}, {"id": "B2_Q12", "topic": "Διαφορές Προ/Ευκαρυωτικών στη Γονιδιακή Ρύθμιση", "type": "open", "question": "Εντοπίστε δύο διαφορές στον έλεγχο της γονιδιακής έκφρασης ανάμεσα σε προκαρυωτικούς και ευκαρυωτικούς οργανισμούς.", "answer": "1) Στους προκαρυωτικούς τα γονίδια οργανώνονται σε οπερόνια, στους ευκαρυωτικούς κάθε γονίδιο ρυθμίζεται αυτόνομα. 2) Στους ευκαρυωτικούς η ρύθμιση γίνεται σε 4 επίπεδα (μεταγραφή, μετά μεταγραφή, μετάφραση, μετά μετάφραση), στους προκαρυωτικούς κυρίως στο επίπεδο μεταγραφής.", "hint": "Σκέψου: οπερόνια vs αυτόνομα γονίδια. Και πόσα επίπεδα ρύθμισης έχει ο καθένας;", "difficulty": "Medium", "page": 47, "source": "Βιβλίο"}, {"id": "B2_Q13", "topic": "Κύτταρα ίδιο DNA - Διαφορετική Έκφραση", "type": "mcq", "question": "Τα κύτταρα του ήπατος, του δέρματος και τα μυϊκά κύτταρα είναι διαφορετικά επειδή:", "options": ["α. υπάρχουν διαφορετικά είδη γονιδίων στα κύτταρα", "β. βρίσκονται σε διαφορετικά όργανα", "γ. διαφορετικά γονίδια λειτουργούν σε κάθε είδος κυττάρου", "δ. περιέχουν διαφορετικούς αριθμούς γονιδίων", "ε. διαφορετικές μεταλλάξεις έχουν συμβεί σε κάθε είδος κυττάρου"], "correct": "γ", "answer": "Γ. Όλα τα κύτταρα του οργανισμού έχουν το ίδιο DNA, αλλά σε κάθε τύπο κυττάρου εκφράζονται (ενεργοποιούνται) διαφορετικά γονίδια.", "hint": "Η κυτταρική διαφοροποίηση δεν αλλάζει το DNA — αλλάζει το ποια γονίδια εκφράζονται.", "difficulty": "Easy", "page": 47, "source": "Βιβλίο"}, {"id": "B2_Q14", "topic": "Οπερόνιο - Απουσία Καταστολέα", "type": "open", "question": "Σε στέλεχος Ε. coli δε λειτουργεί το γονίδιο που παράγει τον καταστολέα του οπερονίου της λακτόζης. Τι συμβαίνει με την παραγωγή ενζύμων const BIOLOGY_CH3 = [{"id": "A3_Q01", "topic": "Ενέργεια Ενεργοποίησης", "type": "open", "question": "Τι είναι η ενέργεια ενεργοποίησης; Πώς τη μειώνουν τα ένζυμα;", "answer": "Ενέργεια ενεργοποίησης είναι η ελάχιστη ενέργεια που πρέπει να προσφερθεί στα αντιδρώντα μόρια για να ξεκινήσει μια χημική αντίδραση. Τα ένζυμα μειώνουν την ενέργεια ενεργοποίησης με τον κατάλληλο προσανατολισμό των μορίων-υποστρωμάτων, ώστε να αλληλεπιδρούν αποτελεσματικά.", "hint": "Ενέργεια ενεργοποίησης = το 'εμπόδιο' που πρέπει να ξεπεραστεί για να γίνει η αντίδραση.", "difficulty": "Medium", "page": 82, "source": "Βιβλίο"}, {"id": "A3_Q02", "topic": "Ενεργό Κέντρο", "type": "open", "question": "Τι είναι το ενεργό κέντρο ενός ενζύμου; Πώς συνδέεται με το υπόστρωμα;", "answer": "Το ενεργό κέντρο είναι μια μικρή περιοχή του ενζύμου, στην οποία γίνεται η πρόσδεση του υποστρώματος. Η σύνδεση μοιάζει με το 'ταίριασμα κλειδιού στην κλειδαριά'. Σε ορισμένες περιπτώσεις το ενεργό κέντρο αποκτά το κατάλληλο σχήμα ΜΕΤΑ την πρόσδεση του υποστρώματος. Η σύνδεση αποσταθεροποιεί τους δεσμούς του υποστρώματος, διευκολύνοντας τη χημική αντίδραση.", "hint": "Κλειδί-κλειδαριά: ένζυμο-υπόστρωμα.", "difficulty": "Easy", "page": 82, "source": "Βιβλίο"}, {"id": "A3_Q03", "topic": "Ταχύτητα Δράσης Ενζύμων", "type": "mcq", "question": "Ο τρόπος δράσης των ενζύμων δείχνει ότι τα ένζυμα:", "options": ["α. Είναι ειδικά (εξειδίκευση)", "β. Επηρεάζονται από τη θερμοκρασία", "γ. Είναι πρωτεΐνες", "δ. Όλα τα προηγούμενα είναι σωστά"], "correct": "δ", "answer": "Δ. Ο τρόπος δράσης των ενζύμων αποκαλύπτει και τα τρία: είναι εξειδικευμένα (κλειδί-κλειδαριά), επηρεάζονται από θερμοκρασία/pH (γιατί είναι πρωτεΐνες) και είναι πρωτεΐνες (τριτοταγής δομή = λειτουργικότητα).", "hint": "Όλες οι ιδιότητες απορρέουν από το γεγονός ότι είναι πρωτεΐνες.", "difficulty": "Easy", "page": 82, "source": "Βιβλίο"}, {"id": "A3_Q04", "topic": "Ιδιότητες Ενζύμων - Αναλλοίωτα", "type": "mcq", "question": "Τι συμβαίνει με το ένζυμο μετά το τέλος της αντίδρασης που καταλύει;", "options": ["α. Καταστρέφεται αμέσως", "β. Μετατρέπεται σε προϊόν", "γ. Παραμένει αναλλοίωτο και μπορεί να ξαναχρησιμοποιηθεί", "δ. Συνδέεται μόνιμα με το υπόστρωμα"], "correct": "γ", "answer": "Γ. Τα ένζυμα παραμένουν αναλλοίωτα — δεν καταναλώνονται στην αντίδραση. Μπορούν να ξαναχρησιμοποιηθούν πολλές φορές ώσπου να καταστραφούν φυσιολογικά.", "hint": "Καταλύτης = δεν καταναλώνεται.", "difficulty": "Easy", "page": 84, "source": "Βιβλίο"}, {"id": "A3_Q05", "topic": "Εξειδίκευση Ενζύμων", "type": "open", "question": "Τι σημαίνει εξειδίκευση ενζύμων; Δώστε παράδειγμα εξειδικευμένου και λιγότερο εξειδικευμένου ενζύμου.", "answer": "Εξειδίκευση = κάθε ένζυμο δρα συνήθως σε ένα μόνο συγκεκριμένο υπόστρωμα. Οφείλεται στο σχήμα του ενεργού κέντρου. Εξειδικευμένο: καταλάση — καταλύει ΜΟΝΟ τη διάσπαση H₂O₂. Λιγότερο εξειδικευμένο: παγκρεατική λιπάση — καταλύει τη διάσπαση πολλών λιπιδίων.", "hint": "Ένα ένζυμο = ένα υπόστρωμα (ή λίγα συγγενικά).", "difficulty": "Medium", "page": 84, "source": "Βιβλίο"}, {"id": "A3_Q06", "topic": "Επίδραση Θερμοκρασίας", "type": "open", "question": "Πώς επηρεάζει η θερμοκρασία τη δραστικότητα των ενζύμων; Τι συμβαίνει στους ~50°C;", "answer": "Κάθε ένζυμο έχει άριστη θερμοκρασία. Τα περισσότερα δρουν άριστα στους 36-38°C. Με αύξηση πάνω από το όριο, η δραστικότητα μειώνεται. Γύρω στους 50°C η αλλαγή γίνεται 'μόνιμη' — τα ένζυμα χάνουν την τριτοταγή τους δομή (αποδιάταξη) και δεν επανέρχονται.", "hint": "Πάνω από 50°C = μόνιμη αποδιάταξη πρωτεΐνης.", "difficulty": "Medium", "page": 85, "source": "Βιβλίο"}, {"id": "A3_Q07", "topic": "Επίδραση pH", "type": "open", "question": "Πώς επηρεάζει το pH τα ένζυμα; Δώστε παράδειγμα ενζύμου που δρα σε όξινο και ενός σε αλκαλικό pH.", "answer": "Κάθε ένζυμο έχει άριστο pH. Ισχυρά όξινο ή αλκαλικό περιβάλλον καταστρέφει τα ένζυμα. Τα ενδοκυτταρικά ένζυμα δρουν άριστα γύρω στο pH 7. Παράδειγμα όξινου: πεψίνη (στομάχι, pH ~2). Παράδειγμα αλκαλικού: θρυψίνη (λεπτό έντερο, pH ~8,5).", "hint": "Πεψίνη = στομάχι (pH~2). Θρυψίνη = λεπτό έντερο (pH~8,5).", "difficulty": "Medium", "page": 85, "source": "Βιβλίο"}, {"id": "A3_Q08", "topic": "Συγκέντρωση Υποστρώματος", "type": "open", "question": "Πώς επηρεάζει η συγκέντρωση υποστρώματος την ταχύτητα της ενζυμικής αντίδρασης; Γιατί κάποια στιγμή σταματά η αύξηση;", "answer": "Αύξηση συγκέντρωσης υποστρώματος → αύξηση ταχύτητας αντίδρασης. Από ένα σημείο όμως, περισσότερο υπόστρωμα ΔΕΝ αυξάνει την ταχύτητα — γιατί το ενεργό κέντρο όλων των ενζύμων είναι ήδη πλήρως καλυμμένο. Τα επιπλέον μόρια υποστρώματος 'περιμένουν τη σειρά τους'.", "hint": "Κάποια στιγμή το ένζυμο 'κορέννυται' — δεν υπάρχουν ελεύθερα ενεργά κέντρα.", "difficulty": "Hard", "page": 85, "source": "Βιβλίο"}, {"id": "A3_Q09", "topic": "Αναστολείς Ενζύμων", "type": "open", "question": "Τι είναι οι αναστολείς ενζύμων; Ποιες κατηγορίες υπάρχουν; Δώστε παράδειγμα μη αντιστρεπτού αναστολέα.", "answer": "Αναστολείς είναι ουσίες που αναστέλλουν τη δράση ενζύμων. Κατηγορίες: 1) Μη αντιστρεπτοί: συνδέονται μόνιμα με το ένζυμο (π.χ. εντομοκτόνα, ιόντα βαρέων μετάλλων: Hg²⁺, Pb²⁺, Ag⁺). 2) Αντιστρεπτοί: εμποδίζουν παροδικά τη δράση — το ένζυμο μπορεί να ανακτήσει τη δραστικότητά του.", "hint": "Μη αντιστρεπτοί = μόνιμη αναστολή (π.χ. δηλητήρια).", "difficulty": "Medium", "page": 85, "source": "Βιβλίο"}, {"id": "A3_Q10", "topic": "Ριβόζυμα", "type": "open", "question": "Τι είναι τα ριβόζυμα και ποια η σημασία της ανακάλυψής τους;", "answer": "Ριβόζυμα είναι μόρια RNA με ενζυμικές ιδιότητες. Ανακαλύφθηκαν το 1978 από τον Άλτμαν. Καταρρίπτουν το δόγμα ότι όλοι οι βιολογικοί καταλύτες είναι πρωτεΐνες. Υποστηρίζεται ότι πιθανώς κάποια εποχή οι γενετικές πληροφορίες μεταφέρονταν από RNA (όχι DNA) — η λεγόμενη 'εποχή RNA'.", "hint": "Ριβό-ζυμα = RNA + ενζυμική δράση. Αμφισβητούν τη μοναρχία των πρωτεϊνών.", "difficulty": "Hard", "page": 84, "source": "Βιβλίο"}, {"id": "A3_Q11", "topic": "Παράγοντες Δράσης - Σύνοψη", "type": "fill_blank", "question": "Η δραστικότητα των ενζύμων επηρεάζεται από: ____, ____, ____ και ____. Τα ένζυμα είναι ____ μόρια, γι' αυτό έχουν συγκεκριμένη ____ δομή που είναι απαραίτητη για τη λειτουργικότητά τους.", "answer": "Θερμοκρασία, pH, συγκέντρωση υποστρώματος, συγκέντρωση ενζύμου. Τα ένζυμα είναι πρωτεϊνικά μόρια, γι' αυτό έχουν συγκεκριμένη τριτοταγή δομή.", "hint": "4 παράγοντες + πρωτεΐνη + τριτοταγής δομή.", "difficulty": "Easy", "page": 84, "source": "Βιβλίο"}, {"id": "A3_Q12", "topic": "Εφαρμογές Ενζύμων", "type": "mcq", "question": "Ποιο ένζυμο χρησιμοποιείται για την πήξη του γάλακτος και τη μετατροπή του σε τυρί/γιαούρτι;", "options": ["α. Αμυλάσες", "β. Λιπάσες", "γ. Πρωτεάσες", "δ. Κυτταρινάσες"], "correct": "γ", "answer": "Γ. Πρωτεάσες — υδρολύουν πρωτεΐνες και χρησιμοποιούνται στην πήξη γάλακτος, παραγωγή τυριού/γιαουρτιού, αλλά και σε απορρυπαντικά και σίτεμα κρέατος.", "hint": "Το γάλα πήζει λόγω πρωτεϊνών (καζεΐνη) → πρωτεάσες.", "difficulty": "Medium", "page": 88, "source": "Βιβλίο"}, {"id": "A3_Q13", "topic": "Ενδο/Εξωκυτταρικά Ένζυμα", "type": "open", "question": "Πώς ταξινομούνται τα ένζυμα ανάλογα με τον τόπο δράσης τους; Πού βρίσκονται τα ενδοκυτταρικά;", "answer": "1) Ενδοκυτταρικά: δρουν μέσα στο κύτταρο, βρίσκονται ελεύθερα στο κυτταρόπλασμα ή δεσμευμένα σε μεμβράνες. 2) Εξωκυτταρικά: εκκρίνονται και δρουν εκτός κυττάρου (π.χ. πεψίνη στομάχου, θρυψίνη λεπτού εντέρου). Τα ένζυμα παίρνουν το όνομά τους από το υπόστρωμα + κατάληξη -άση.", "hint": "Ενδο- = μέσα. Εξω- = έξω από κύτταρο.", "difficulty": "Easy", "page": 84, "source": "Βιβλίο"}, {"id": "A3_Q14", "topic": "Ασθένειες από Έλλειψη Ενζύμων", "type": "mcq", "question": "Η φαινυλκετονουρία οφείλεται σε έλλειψη ενζύμου που:", "options": ["α. Διασπά τη λακτόζη", "β. Συμμετέχει στο σχηματισμό μελανίνης", "γ. Μετατρέπει τη φαινυλαλανίνη σε τυροσίνη", "δ. Διασπά κυάμους"], "correct": "γ", "answer": "Γ. Η φαινυλκετονουρία (PKU) οφείλεται σε έλλειψη του ενζύμου που μετατρέπει τη φαινυλαλανίνη σε τυροσίνη. Η συσσώρευση φαινυλαλανίνης προκαλεί βλάβες στο νευρικό σύστημα. Θεραπεία: διατροφή με περιορισμένη φαινυλαλανίνη.", "hint": "PKU = φαινυλαλανίνη δεν μετατρέπεται → συσσωρεύεται → βλάβη εγκεφάλου.", "difficulty": "Medium", "page": 87, "source": "Βιβλίο"}];
const BIOLOGY_CH4 = [{"id": "B4_Q01", "topic": "Εργαλεία Γενετικής Μηχανικής", "type": "open", "question": "Γιατί οι περιοριστικές ενδονουκλεάσες και οι φορείς κλωνοποίησης είναι απαραίτητα εργαλεία για τη Γενετική Μηχανική;", "answer": "Οι περιοριστικές ενδονουκλεάσες κόβουν το DNA σε εξειδικευμένες θέσεις δημιουργώντας συμπληρωματικά (sticky) άκρα. Οι φορείς (πλασμίδια/φάγοι) μεταφέρουν το ξένο DNA μέσα στο κύτταρο-ξενιστή και επιτρέπουν την αυτοδιπλασίασή του. Χωρίς αυτά, δεν μπορεί να γίνει εισαγωγή και πολλαπλασιασμός ξένου DNA.", "hint": "Ένα 'κόβει', το άλλο 'μεταφέρει'. Γιατί χρειαζόμαστε και τα δύο;", "difficulty": "Medium", "page": 69, "source": "Βιβλίο"}, {"id": "B4_Q02", "topic": "Γονιδιωματική Βιβλιοθήκη", "type": "mcq", "question": "Τι είναι μια γονιδιωματική βιβλιοθήκη;", "options": ["α. Ένας κλώνος βακτηρίων που περιέχει ένα τμήμα DNA ενός οργανισμού", "β. Μια συλλογή βιβλίων για κλώνους", "γ. Ένα σύνολο από κλώνους βακτηρίων που ο καθένας έχει ένα πλασμίδιο με διαφορετικό τμήμα DNA ενός οργανισμού", "δ. Ένα σύνολο από περιοριστικές ενδονουκλεάσες", "ε. Τίποτε από τα παραπάνω"], "correct": "γ", "answer": "Γ. Η γονιδιωματική βιβλιοθήκη είναι το σύνολο των βακτηριακών κλώνων, ο κάθε ένας από τους οποίους έχει ένα διαφορετικό τμήμα DNA του οργανισμού — μαζί αντιπροσωπεύουν όλο το γονιδίωμα.", "hint": "Η λέξη 'βιβλιοθήκη' υπονοεί πολλά διαφορετικά 'βιβλία' (κλώνοι) που μαζί καλύπτουν το σύνολο.", "difficulty": "Easy", "page": 69, "source": "Βιβλίο"}, {"id": "B4_Q03", "topic": "Ανασυνδυασμένο DNA & Καθολικότητα Κώδικα", "type": "open", "question": "Θα μπορούσε να αναπτυχθεί η τεχνολογία του ανασυνδυασμένου DNA αν ο γενετικός κώδικας δεν ήταν καθολικός; Αιτιολογήστε.", "answer": "Όχι. Αν ο κώδικας δεν ήταν καθολικός, τα βακτήρια δεν θα μπορούσαν να μεταφράσουν σωστά τα ανθρώπινα γονίδια. Η καθολικότητα επιτρέπει σε βακτήρια-ξενιστές να παράγουν ανθρώπινες πρωτεΐνες (π.χ. ινσουλίνη) από ξένο DNA.", "hint": "Σκέψου: αν βακτήριο και άνθρωπος είχαν διαφορετικό : "Αχρωματοψία - Φυλοσύνδετη", "type": "open", "question": "Εξηγήστε γιατί η μερική αχρωματοψία εμφανίζεται συχνότερα στους άνδρες παρά στις γυναίκες.", "answer": "Η αχρωματοψία ελέγχεται από υπολειπόμενο φυλοσύνδετο γονίδιο στο Χ χρωμόσωμα. Οι άνδρες (ΧY) έχουν μόνο ένα Χ — αν αυτό φέρει το παθολογικό αλληλόμορφο, εκδηλώνουν ασθένεια. Οι γυναίκες (ΧΧ) πρέπει να έχουν ΚΑΙ ΤΑ ΔΥΟ Χ με παθολογικό αλληλόμορφο (πολύ σπανιότερο).", "hint": "Άνδρας χρειάζεται 1 κακό Χ, γυναίκα χρειάζεται 2.", "difficulty": "Medium", "page": 87, "source": "Βιβλίο"}, {"id": "B5_Q08", "topic": "Πιθανότητα Κληρονόμησης Ασθένειας", "type": "calculation", "question": "Δημοσθένης και Ευτέρπη είναι υγιείς φορείς αυτοσωμικής υπολειπόμενης ασθένειας. Τα τρία πρώτα παιδιά τους είναι υγιή. Ποια είναι η πιθανότητα το τέταρτο παιδί να κληρονομήσει την ασθένεια;", "answer": "25%. Κάθε κύηση είναι ανεξάρτητο γεγονός. Η διασταύρωση Αα × Αα δίνει πάντα 1ΑΑ:2Αα:1αα, άρα 25% πιθανότητα για αα (ασθενές). Τα προηγούμενα παιδιά δεν επηρεάζουν την πιθανότητα.", "hint": "Κάθε κύηση είναι ανεξάρτητη από τις προηγούμενες — σαν να πετάς νόμισμα.", "difficulty": "Medium", "page": 87, "source": "Βιβλίο"}, {"id": "B5_Q09", "topic": "Αυτοσωμική Επικρατής Κληρονομικότητα", "type": "open", "question": "Αντιστοιχίστε: 1) Αυτοσωμική επικρατής — 2) Αυτοσωμική υπολειπόμενη — 3) Φυλοσύνδετη κληρονομικότητα με: α) 25% πιθανότητα παθολογικού απογόνου από δύο φορείς — β) γυναίκα φορέας → αγόρι ασθενές — γ) δύο πάσχοντες μπορούν να αποκτήσουν υγιές παιδί.", "answer": "1-γ (αυτοσωμική επικρατής: Αα × Αα → δυνατόν αα = υγιές). 2-α (υπολειπόμενη: 25% αα από Αα × Αα). 3-β (φυλοσύνδετη: φορέας μητέρα → 50% αγόρια ασθενή).", "hint": "Σκέψου ποιος τύπος κληρονομικότητας ταιριάζει σε κάθε περίγραμμα.", "difficulty": "Medium", "page": 87, "source": "Βιβλίο"}, {"id": "B5_Q10", "topic": "Φαινοτυπική Αναλογία F2 Διυβριδισμού", "type": "open", "question": "Υπάρχει περίπτωση σε διασταύρωση διυβριδισμού η φαινοτυπική αναλογία F2 να είναι διαφορε
