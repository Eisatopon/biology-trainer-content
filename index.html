const BIOLOGY_CH6 = [{"id": "B6_Q01", "topic": "Τύποι Μεταλλάξεων - Ουδέτερη Μετάλλαξη", "type": "mcq", "question": "Γενετιστής βρήκε ότι μια μετάλλαξη σε ένα γονίδιο δεν είχε επίδραση στην πολυπεπτιδική αλυσίδα. Σε τι μπορεί να οφείλεται;", "options": ["α. Σε έλλειψη μίας βάσης", "β. Σε αλλαγή στο κωδικόνιο έναρξης", "γ. Σε προσθήκη μίας βάσης", "δ. Σε έλλειψη ολόκληρου του γονιδίου", "ε. Σε αντικατάσταση μίας βάσης"], "correct": "ε", "answer": "Ε. Αντικατάσταση μίας βάσης — λόγω εκφυλισμού του γενετικού κώδικα το νέο κωδικόνιο μπορεί να κωδικοποιεί το ΊΔΙΟ αμινοξύ (συνώνυμα κωδικόνια). Έλλειψη/προσθήκη βάσης αλλάζει ολόκληρο το πλαίσιο ανάγνωσης.", "hint": "Ποιος τύπος μετάλλαξης μπορεί να είναι 'ουδέτερος' λόγω εκφυλισμού κώδικα;", "difficulty": "Hard", "page": 106, "source": "Βιβλίο"}, {"id": "B6_Q02", "topic": "Αναγνώριση Τύπου Μετάλλαξης", "type": "open", "question": "Φυσιολογική πρωτεΐνη: Glu-Cys-Met-Phe-Trp-Asp. Αναγνωρίστε τον τύπο μετάλλαξης για: Α) Glu-Cys-Ile-Phe-Trp-Asp, Β) Glu-Val-Cys-Ser-Gly-Thr, Γ) Glu-Cys-Met-Phe (σταματά), Δ) Glu-Met-Tyr-Val-Leu-Gly.", "answer": "Α) Αντικατάσταση μίας βάσης (στο 3ο αμινοξύ: Met→Ile). Β) Έλλειψη/προσθήκη βάσης — ολίσθηση πλαισίου ανάγνωσης από το 2ο αμινοξύ. Γ) Αντικατάσταση βάσης που δημιούργησε κωδικόνιο λήξης μετά το 4ο αμινοξύ. Δ) Έλλειψη/προσθήκη βάσης — ολίσθηση πλαισίου από το 2ο αμινοξύ.", "hint": "Αν αλλάζει μόνο 1 αμινοξύ → αντικατάσταση. Αν αλλάζουν όλα από κάποιο σημείο → ολίσθηση πλαισίου. Αν κόβεται → κωδικόνιο λήξης.", "difficulty": "Hard", "page": 106, "source": "Βιβλίο"}, {"id": "B6_Q03", "topic": "Ανευπλοειδία - Λανθασμένη Πρόταση", "type": "mcq", "question": "Ποια από τις παρακάτω προτάσεις για την ανευπλοειδία είναι ΛΑΝΘΑΣΜΕΝΗ;", "options": ["α. Οφείλεται συνήθως στο μη διαχωρισμό χρωμοσωμάτων κατά τη μείωση", "β. Στα κύτταρα υπάρχει ένα επιπλέον χρωμόσωμα (τρισωμία)", "γ. Στα κύτταρα υπάρχει ένα λιγότερο χρωμόσωμα (μονοσωμία)", "δ. Στα κύτταρα λείπει τμήμα ενός χρωμοσώματος"], "correct": "δ", "answer": "Δ. ΛΑΝΘΑΣΜΕΝΗ — η έλλειψη τμήματος χρωμοσώματος είναι δομική χρωμοσωμική ανωμαλία (όχι αριθμητική/ανευπλοειδία). Η ανευπλοειδία αφορά αλλαγές στον ΑΡΙΘΜΟ χρωμοσωμάτων.", "hint": "Ανευπλοειδία = αριθμητική ανωμαλία. Έλλειψη τμήματος = δομική ανωμαλία.", "difficulty": "Medium", "page": 106, "source": "Βιβλίο"}, {"id": "B6_Q04", "topic": "Αριθμός Χρωμοσωμάτων - Πίνακας", "type": "mcq", "question": "Ποια στήλη (Α-Ε) είναι σωστή για τον αριθμό χρωμοσωμάτων: Ζυγωτό / Γαμέτης / Μονοσωμικό σωματικό / Τρισωμικό σωματικό;", "options": ["Α: 46/23/46/47", "Β: 23/23/45/47", "Γ: 46/46/45/47", "Δ: 46/23/45/47", "Ε: 46/23/45/24"], "correct": "Δ", "answer": "Δ: 46/23/45/47. Ζυγωτό=46(2n), γαμέτης=23(n), μονοσωμικό=45(2n-1), τρισωμικό=47(2n+1).", "hint": "Φυσιολογικό: 2n=46. Μονοσωμία: 2n-1=45. Τρισωμία: 2n+1=47.", "difficulty": "Medium", "page": 106, "source": "Βιβλίο"}, {"id": "B6_Q05", "topic": "Σύνδρομα Χρωμοσωμικών Ανωμαλιών", "type": "ordering", "question": "Να σχηματίσετε τα σωστά ζευγάρια: α) Σύνδρομο cri du chat, β) Σύνδρομο Klinefelter, γ) Σύνδρομο Down, δ) Σύνδρομο Turner με: 1) τρισωμία φυλετικών, 2) τρισωμία αυτοσωμικών, 3) μονοσωμία φυλετικών, 4) έλλειψη.", "answer": "α-4 (cri du chat = έλλειψη χρωμ.5). β-1 (Klinefelter = XXY, τρισωμία φυλετικών). γ-2 (Down = τρισωμία 21, αυτοσωμική). δ-3 (Turner = X0, μονοσωμία φυλετικών).", "hint": "Down=χρωμ.21, Turner=μόνο X, Klinefelter=XXY, cri du chat=κομμένο χρωμ.5.", "difficulty": "Medium", "page": 106, "source": "Βιβλίο"}, {"id": "B6_Q06", "topic": "Καρυότυπος - Ανίχνευση Ανωμαλιών", "type": "open", "question": "Ποιες από τις παρακάτω γενετικές ανωμαλίες μπορούν να ανιχνευθούν με τον καρυότυπο; α) Δρεπανοκυτταρική αναιμία, β) Σύνδρομο Klinefelter, γ) Σύνδρομο Down, δ) Φαινυλκετονουρία, ε) β-θαλασσαιμία, στ) Σύνδρομο Turner. Αιτιολογήστε.", "answer": "Μπορούν: β, γ, στ — είναι χρωμοσωμικές ανωμαλίες (αλλαγές στον αριθμό/δομή χρωμοσωμάτων) που φαίνονται στον καρυότυπο. ΔΕΝ μπορούν: α, δ, ε — είναι γονιδιακές μεταλλάξεις (αλλαγές σε επίπεδο βάσεων DNA) που ΔΕΝ φαίνονται στον καρυότυπο.", "hint": "Καρυότυπος βλέπει χρωμοσώματα (μέγεθος/αριθμό). Γονιδιακές μεταλλάξεις χρειάζονται ανάλυση DNA.", "difficulty": "Medium", "page": 106, "source": "Βιβλίο"}, {"id": "B6_Q07", "topic": "Δομικές Χρωμοσωμικές Ανωμαλίες", "type": "open", "question": "Ποιες από τις παρακάτω δομικές χρωμοσωμικές ανωμαλίες αλλάζουν την ΠΟΣΟΤΗΤΑ γενετικής πληροφορίας; α) Έλλειψη, β) Αναστροφή, γ) Διπλασιασμός, δ) Αμοιβαία μετατόπιση. Αιτιολογήστε.", "answer": "Αλλάζουν ποσότητα: α) Έλλειψη (χάνεται υλικό) και γ) Διπλασιασμός (προστίθεται υλικό). ΔΕΝ αλλάζουν ποσότητα: β) Αναστροφή (ίδιο υλικό, ανεστραμμένο) και δ) Αμοιβαία μετατόπιση (ανταλλαγή τμημάτων χωρίς απώλεια/κέρδος).", "hint": "Αλλάζει ποσότητα = κάτι χάνεται ή διπλασιάζεται.", "difficulty": "Medium", "page": 106, "source": "Βιβλίο"}, {"id": "B6_Q08", "topic": "ΧΥΥ Χρωμοσωμική Σύσταση", "type": "open", "question": "Ένα παιδί γεννήθηκε με χρωμοσωμική σύσταση ΧΥΥ. Υποδείξτε την πιθανή μετάλλαξη που συνέβη.", "answer": "Μη διαχωρισμός (non-disjunction) κατά τη 2η μειωτική διαίρεση του ΠΑΤΕΡΑ: τα δύο αδελφά χρωματίδια Υ δεν διαχωρίστηκαν → σχηματίστηκε σπερματοζωάριο ΥΥ. Γονιμοποίηση με φυσιολογικό ωάριο Χ → ΧΥΥ.", "hint": "ΧΥΥ = φυσιολογικό Χ από μητέρα + ΥΥ από πατέρα. Άρα το λάθος ήταν στον πατέρα.", "difficulty": "Hard", "page": 106, "source": "Βιβλίο"}, {"id": "B6_Q09", "topic": "Αχρωματοψία σε Θηλυκό", "type": "open", "question": "Από γάμο δύο υγιών ατόμων γεννήθηκε κορίτσι με μερική αχρωματοψία. Υποδείξτε έναν πιθανό μηχανισμό (χωρίς γονιδιακή μετάλλαξη).", "answer": "Μη διαχωρισμός στον ΠΑΤΕΡΑ κατά τη μείωση: παρήχθη σπερματοζωάριο XαXα (φέρει το παθολογικό αλληλόμορφο σε διπλή δόση). Γονιμοποίηση ωαρίου Xα (η μητέρα ήταν φορέας) → XαXαXα (τρισωμία) ή παραλλαγές. Εναλλακτικά: μη διαχωρισμός στη μητέρα → ωάριο XαXα + σπερματοζωάριο Xα → XαXα.", "hint": "Το κορίτσι έχει XαXα — χρειάζεται Xα και από τους δύο γονείς. Αν ο πατέρας είναι υγιής (XΑY), πώς έδωσε Xα;", "difficulty": "Hard", "page": 106, "source": "Βιβλίο"}, {"id": "B6_Q10", "topic": "Αντικατάσταση Βάσης σε Προκαρυωτικό", "type": "open", "question": "Ποιο θα είναι το αποτέλεσμα στην πρωτεΐνη αν σε προκαρυωτικό κύτταρο γίνει αντικατάσταση μίας βάσης στο γονίδιο;", "answer": "Τρία πιθανά αποτελέσματα: 1) Σιωπηλή μετάλλαξη — νέο συνώνυμο κωδικόνιο, ίδιο αμινοξύ, καμία αλλαγή στην πρωτεΐνη. 2) Μετάλλαξη missense — νέο κωδικόνιο κωδικοποιεί διαφορετικό αμινοξύ, η πρωτεΐνη αλλάζει (ίσως λειτουργική ή μη). 3) Μετάλλαξη nonsense — δημιουργείται κωδικόνιο λήξης, παράγεται κολοβωμένη/μη λειτουργική πρωτεΐνη.", "hint": "Αντικατάσταση βάσης → αλλάζει ένα κωδικόνιο → 3 πιθανά αποτελέσματα.", "difficulty": "Medium", "page": 106, "source": "Βιβλίο"}, {"id": "PAN_CH6_01", "topic": "Γενικά", "type": "mcq", "source": "Πανελλαδικές", "question": "Σε χρωμοσωμική ανωμαλία οφείλεται", "options": ["α.   η οικογενής υπερχοληστερολαιμία", "β.   το σύνδρομο φωνή της γάτας", "γ.   η α-θαλασσαιμία", "δ.   ο αλφισμός."], "correct": "β", "answer": "Β. Σύνδρομο φωνή της γάτας — είναι δομική χρωμοσωμική ανωμαλία (έλλειψη χρωμ.5). Τα άλλα είναι γονιδιακές μεταλλάξεις.", "hint": "Ερώτηση από Πανελλαδικές. Σκέψου: Σε χρωμοσωμική ανωμαλία οφείλεται...", "difficulty": "Medium", "page": 0}, {"id": "PAN_CH6_02", "topic": "Γενικά", "type": "mcq", "source": "Πανελλαδικές", "question": "Σε χρωμοσωμική ανωμαλία οφείλεται", "options": ["α.   το σύνδρομο Down", "β.   η β-θαλασσαιμία", "γ.   ο αλφισμός", "δ.   η κυστική ίνωση."], "correct": "β", "answer": "Β. Σύνδρομο φωνή της γάτας — είναι δομική χρωμοσωμική ανωμαλία (έλλειψη χρωμ.5). Τα άλλα είναι γονιδιακές μεταλλάξεις.", "hint": "Ερώτηση από Πανελλαδικές. Σκέψου: Σε χρωμοσωμική ανωμαλία οφείλεται...", "difficulty": "Medium", "page": 0}, {"id": "PAN_CH6_03", "topic": "Χρωμοσωμικές Ανωμαλίες", "type": "mcq", "source": "Πανελλαδικές", "question": "Η πιθανότητα να προκύψουν άτομα με σύνδρομο Turner κατά τον λάθος σχηματισμό των γαμετών είναι:", "options": ["α. αυξημένη όταν ο μη αποχωρισμ ός συμβεί κατά την πρώτη μειωτική", "β. αυξημένη όταν ο μη αποχωρισμ ός συμβεί στη δεύτερη μειωτική διαίρεση", "γ. αυξημένη όταν ο μη αποχωρισμ ός συμβεί στη δεύτερη μειωτική διαίρεση", "δ. ίδια σε όλες τις παραπάνω περιπτώσεις."], "correct": "δ", "answer": "Δ. Ίδια σε όλες τις περιπτώσεις — X0 μπορεί να προκύψει από μη αποχωρισμό σε οποιαδήποτε μείωση.", "hint": "Ερώτηση από Πανελλαδικές. Σκέψου: Η πιθανότητα να προκύψουν άτομα με σύνδρομο Turner κατά τον ...", "difficulty": "Medium", "page": 0}, {"id": "PAN_CH6_04", "topic": "Αιμοσφαιρινοπάθειες", "type": "mcq", "source": "Πανελλαδικές", "question": "Ποιος είναι ο μέγιστος αριθμός διαφορετικών πολυπεπτιδικών αλυσίδων των αιμοσφαιρινών που μπορεί να συνθέσει ένα ενήλικο άτομο-φορέας της δρεπανοκυτταρικής αναιμίας;", "options": ["α. 2.", "β. 4.", "γ. 5.", "δ. 6."], "correct": "α", "answer": "Σωστή απάντηση: Α. Ποιος είναι ο μέγιστος αριθμός διαφορετικών πολυπεπτιδικών αλυσίδων των αιμοσφαιρινών που μπορεί να ", "hint": "Ερώτηση από πραγματικό θέμα Πανελλαδικών.", "difficulty": "Medium", "page": 0}, {"id": "PAN_CH6_05", "topic": "Γενικά", "type": "mcq", "source": "Πανελλαδικές", "question": "Από τα παρακάτω θηλυκά άτομα, περισσότερο πυρηνικό DNA παρατηρείται στο άτομο που πάσχει από", "options": ["α.   σύνδρομο Down.", "β.   τρισωμία 13.", "γ.   σύνδρομο Turner.", "δ.   σύνδρομο «φωνή της γάτας»."], "correct": "α", "answer": "Σωστή απάντηση: Α. Από τα παρακάτω θηλυκά άτομα, περισσότερο πυρηνικό DNA παρατηρείται στο άτομο που πάσχει από", "hint": "Ερώτηση από πραγματικό θέμα Πανελλαδικών.", "difficulty": "Medium", "page": 0}];
const BIOLOGY_CH7 = [{"id": "B7_Q01", "topic": "Ορισμός Βιοτεχνολογίας", "type": "fill_blank", "question": "Βιοτεχνολογία με την ευρεία έννοια είναι ____. Ο όρος χρησιμοποιήθηκε για πρώτη φορά από τον ____ το ____.", "answer": "Η χρήση ζωντανών οργανισμών προς όφελος του ανθρώπου. Ο όρος χρησιμοποιήθηκε από τον Ούγγρο Kark Ereky το 1919.", "hint": "Βιο- = ζωή, τεχνολογία = εφαρμογή επιστήμης.", "difficulty": "Easy", "page": 111, "source": "Βιβλίο"}, {"id": "B7_Q02", "topic": "Χρόνος Διπλασιασμού", "type": "mcq", "question": "Ποιος παράγοντας ΔΕΝ επηρεάζει το χρόνο διπλασιασμού των μικροοργανισμών;", "options": ["α. Διαθεσιμότητα θρεπτικών συστατικών", "β. pH", "γ. Παρουσία Ο2", "δ. Χρώμα του θρεπτικού υλικού"], "correct": "δ", "answer": "Δ. Το χρώμα δεν επηρεάζει. Οι παράγοντες που επηρεάζουν τον χρόνο διπλασιασμού είναι: θρεπτικά συστατικά, pH, Ο2 και θερμοκρασία.", "hint": "Σκέψου τι χρειάζεται το κύτταρο για να αναπτυχθεί.", "difficulty": "Easy", "page": 112, "source": "Βιβλίο"}, {"id": "B7_Q03", "topic": "Κατηγορίες Μικροοργανισμών - Ο2", "type": "open", "question": "Ποιες κατηγορίες μικροοργανισμών υπάρχουν ανάλογα με την ανάγκη τους σε Ο2; Δώστε ένα παράδειγμα για κάθε κατηγορία.", "answer": "1) Υποχρεωτικά αερόβιοι: απαιτούν υψηλή συγκέντρωση Ο2 (π.χ. Mycobacterium). 2) Προαιρετικά αερόβιοι: αναπτύσσονται καλύτερα με Ο2 αλλά και χωρίς (π.χ. μύκητες αρτοβιομηχανίας). 3) Υποχρεωτικά αναερόβιοι: το Ο2 είναι τοξικό (π.χ. Clostridium).", "hint": "Τρεις κατηγορίες: αερόβιοι, προαιρετικά αερόβιοι, αναερόβιοι.", "difficulty": "Medium", "page": 112, "source": "Βιβλίο"}, {"id": "B7_Q04", "topic": "Φάσεις Κλειστής Καλλιέργειας", "type": "ordering", "question": "Αναφέρετε τις 4 φάσεις ανάπτυξης μικροοργανισμών σε κλειστή καλλιέργεια με τη σωστή σειρά και περιγράψτε κάθε μία.", "answer": "1) Λανθάνουσα: ο πληθυσμός παραμένει σχεδόν σταθερός — προσαρμογή στις νέες συνθήκες. 2) Εκθετική: ταχύς πολλαπλασιασμός — ο αριθμός αυξάνεται εκθετικά. 3) Στατική: ο πληθυσμός σταθεροποιείται — εξάντληση θρεπτικών ή συσσώρευση τοξικών προϊόντων. 4) Φάση θανάτου: ο αριθμός μειώνεται.", "hint": "Λανθάνουσα → Εκθετική → Στατική → Θάνατος.", "difficulty": "Medium", "page": 114, "source": "Βιβλίο"}, {"id": "B7_Q05", "topic": "Βιοαντιδραστήρας", "type": "open", "question": "Τι είναι ο βιοαντιδραστήρας και ποιες συνθήκες ελέγχει;", "answer": "Ο βιοαντιδραστήρας (ή ζυμωτήρας) είναι ειδική συσκευή για βιομηχανική καλλιέργεια μικροοργανισμών σε μεγάλη κλίμακα. Ελέγχει και ρυθμίζει τις συνθήκες καλλιέργειας: θερμοκρασία, pH, συγκέντρωση Ο2 και θρεπτικά συστατικά.", "hint": "Βιοαντιδραστήρας = 'εργοστάσιο' μικροοργανισμών με ελεγχόμενες συνθήκες.", "difficulty": "Easy", "page": 113, "source": "Βιβλίο"}, {"id": "B7_Q06", "topic": "Ζύμωση", "type": "mcq", "question": "Με τον όρο 'ζύμωση' εννοούμε:", "options": ["α. Μόνο αναερόβιες διεργασίες", "β. Μόνο αερόβιες διεργασίες", "γ. Την ανάπτυξη μικροοργανισμών σε υγρό θρεπτικό υλικό κάτω από οποιεσδήποτε συνθήκες", "δ. Μόνο τη ζύμωση αλκοόλης"], "correct": "γ", "answer": "Γ. Ζύμωση = ανάπτυξη μικροοργανισμών σε υγρό θρεπτικό υλικό κάτω από οποιεσδήποτε συνθήκες (αερόβιες ή αναερόβιες). Παλαιότερα ο όρος αφορούσε μόνο αναερόβιες διεργασίες, αλλά σήμερα έχει ευρύτερη έννοια.", "hint": "Σύγχρονος ορισμός: ζύμωση = οποιαδήποτε μικροβιακή καλλιέργεια σε υγρό.", "difficulty": "Hard", "page": 113, "source": "Βιβλίο"}, {"id": "B7_Q07", "topic": "Taq Πολυμεράση", "type": "open", "question": "Από ποιον οργανισμό παράγεται η Taq πολυμεράση και γιατί είναι χρήσιμη στην PCR;", "answer": "Η Taq πολυμεράση παράγεται από το θερμόφιλο βακτήριο Thermus aquaticus που αναπτύσσεται κοντά σε θερμοπηγές (~80°C). Είναι ενεργή μέχρι τους 95°C — αυτό την κάνει κατάλληλη για PCR, όπου η θερμοκρασία ανεβαίνει στους 95°C για αποδιάταξη του DNA.", "hint": "Θερμοσταθερό ένζυμο = αντέχει στις υψηλές θερμοκρασίες της PCR.", "difficulty": "Medium", "page": 112, "source": "Βιβλίο"}, {"id": "B7_Q08", "topic": "Προϊόντα Ζύμωσης", "type": "mcq", "question": "Τα προϊόντα της ζύμωσης μπορεί να είναι:", "options": ["α. Μόνο τα ίδια τα κύτταρα (βιομάζα)", "β. Μόνο χρήσιμα προϊόντα των κυττάρων (πρωτεΐνες, αντιβιοτικά)", "γ. Τόσο τα κύτταρα (βιομάζα) όσο και χρήσιμα προϊόντα τους", "δ. Μόνο αλκοόλη"], "correct": "γ", "answer": "Γ. Τα προϊόντα ζύμωσης είναι είτε τα ίδια τα κύτταρα (βιομάζα) είτε χρήσιμα προϊόντα τους, όπως πρωτεΐνες και αντιβιοτικά.", "hint": "Βιομάζα ή μεταβολικά προϊόντα.", "difficulty": "Easy", "page": 113, "source": "Βιβλίο"}, {"id": "B7_Q09", "topic": "Ασηψία στις Καλλιέργειες", "type": "open", "question": "Γιατί είναι απαραίτητη η αποστείρωση στις μικροβιακές καλλιέργειες;", "answer": "Για να αποφευχθεί η μόλυνση της καλλιέργειας από ανεπιθύμητους μικροοργανισμούς, οι οποίοι θα ανταγωνίζονταν τον επιθυμητό μικροοργανισμό και θα αλλοίωναν το προϊόν. Το θρεπτικό υλικό και ο βιοαντιδραστήρας αποστειρώνονται πριν από τη χρήση.", "hint": "Ανεπιθύμητοι μικροοργανισμοί = μόλυνση = αλλοίωση προϊόντος.", "difficulty": "Easy", "page": 113, "source": "Βιβλίο"}];
const BIOLOGY_CH8 = [{"id": "B8_Q01", "topic": "Στόχοι Βιοτεχνολογίας στην Ιατρική", "type": "open", "question": "Σε ποιους τρεις βασικούς στόχους της Ιατρικής έχει συμβάλει αποτελεσματικά η Βιοτεχνολογία;", "answer": "1) Έγκαιρη διάγνωση ασθενειών (πριν εμφανιστούν συμπτώματα). 2) Πρόληψη σοβαρών ασθενειών (ανάπτυξη εμβολίων). 3) Αποτελεσματική θεραπεία (παραγωγή φαρμακευτικών πρωτεϊνών, γονιδιακή θεραπεία).", "hint": "Διάγνωση - Πρόληψη - Θεραπεία.", "difficulty": "Easy", "page": 119, "source": "Βιβλίο"}, {"id": "B8_Q02", "topic": "Ινσουλίνη - Παραγωγή", "type": "open", "question": "Περιγράψτε τα βασικά στάδια παραγωγής ανθρώπινης ινσουλίνης με μεθόδους Γενετικής Μηχανικής.", "answer": "1) Απομόνωση του συνολικού mRNA από κύτταρα ανθρώπινου παγκρέατος. 2) Κατασκευή cDNA από το mRNA (με αντίστροφη μεταγραφάση) και ενσωμάτωση σε πλασμίδια. 3) Μετασχηματισμός βακτηρίων (E. coli) με τα ανασυνδυασμένα πλασμίδια. 4) Πολλαπλασιασμός βακτηρίων σε θρεπτικό υλικό. 5) Παραγωγή προϊνσουλίνης → ενζυμική μετατροπή σε ινσουλίνη.", "hint": "mRNA παγκρέατος → cDNA → πλασμίδιο → βακτήριο → ινσουλίνη.", "difficulty": "Hard", "page": 121, "source": "Βιβλίο"}, {"id": "B8_Q03", "topic": "Ινσουλίνη - Δομή", "type": "mcq", "question": "Από τι αποτελείται η ινσουλίνη;", "options": ["α. Από ένα μεγάλο πολυπεπτίδιο", "β. Από δύο μικρά πεπτίδια (Α και Β) συγκρατούμενα με δισουλφιδικούς δεσμούς", "γ. Από DNA και πρωτεΐνη", "δ. Από γλυκόζη"], "correct": "β", "answer": "Β. Η ινσουλίνη αποτελείται από δύο μικρά πεπτίδια Α και Β, που συγκρατούνται μεταξύ τους με δισουλφιδικούς δεσμούς. Συνολικά έχει 51 αμινοξέα.", "hint": "Ινσουλίνη = 51 αμινοξέα σε 2 αλυσίδες (Α και Β).", "difficulty": "Medium", "page": 121, "source": "Βιβλίο"}, {"id": "B8_Q04", "topic": "Γιατί cDNA για Ινσουλίνη", "type": "open", "question": "Γιατί για την παραγωγή ινσουλίνης σε βακτήρια χρησιμοποιείται cDNA (από mRNA) και όχι απευθείας το γονίδιο DNA;", "answer": "Γιατί το ανθρώπινο γονίδιο περιέχει εσώνια, τα οποία τα βακτήρια δεν μπορούν να αφαιρέσουν (δεν έχουν το μηχανισμό ωρίμανσης mRNA). Το cDNA κατασκευάζεται από ώριμο mRNA (χωρίς εσώνια) και τα βακτήρια μπορούν να το εκφράσουν σωστά.", "hint": "Βακτήρια = προκαρυωτικά → δεν αφαιρούν εσώνια → χρειάζεται cDNA.", "difficulty": "Hard", "page": 121, "source": "Βιβλίο"}, {"id": "B8_Q05", "topic": "Εμβόλια Υπομονάδες", "type": "open", "question": "Τι είναι τα εμβόλια-υπομονάδες; Ποιο είναι το πλεονέκτημά τους;", "answer": "Τα εμβόλια-υπομονάδες παράγονται κλωνοποιώντας μόνο το γονίδιο που κωδικοποιεί την αντιγονική πρωτεΐνη επιφάνειας (όχι ολόκληρο τον παθογόνο). Η πρωτεΐνη παράγεται σε κυτταροκαλλιέργεια και χρησιμοποιείται ως εμβόλιο. Πλεονέκτημα: δεν υπάρχει κίνδυνος μόλυνσης από τον παθογόνο παράγοντα.", "hint": "Υπο-μονάδα = μέρος του παθογόνου (μόνο η αντιγονική πρωτεΐνη).", "difficulty": "Medium", "page": 125, "source": "Βιβλίο"}, {"id": "B8_Q06", "topic": "Γονιδιακή Θεραπεία", "type": "open", "question": "Τι είναι η γονιδιακή θεραπεία; Μεταβιβάζεται στους απογόνους;", "answer": "Γονιδιακή θεραπεία είναι η εισαγωγή του φυσιολογικού αντιγράφου ενός γονιδίου σε συγκεκριμένα σωματικά κύτταρα (όχι αντικατάσταση του μεταλλαγμένου). Δεν μεταβιβάζεται στους απογόνους, γιατί γίνεται μόνο σε σωματικά κύτταρα, όχι στα γαμετικά.", "hint": "Σωματικά κύτταρα → δεν κληρονομείται. Γαμετικά → θα κληρονομείτο.", "difficulty": "Medium", "page": 128, "source": "Βιβλίο"}, {"id": "B8_Q07", "topic": "Κυστική Ίνωση - Γονιδιακή Θεραπεία", "type": "open", "question": "Περιγράψτε την εφαρμογή γονιδιακής θεραπείας στην κυστική ίνωση.", "answer": "Η κυστική ίνωση οφείλεται σε μετάλλαξη γονιδίου στο 7ο χρωμόσωμα (υπολειπόμενη αυτοσωμική). Το φυσιολογικό γονίδιο ενσωματώθηκε σε αδενοϊό. Ο ανασυνδυασμένος ιός εισήλθε με ψεκασμό στο αναπνευστικό σύστημα, μόλυνε τα επιθηλιακά κύτταρα των πνευμόνων και ενσωμάτωσε το φυσιολογικό γονίδιο.", "hint": "Αδενοϊός = φορέας, εισαγωγή με ψεκασμό στους πνεύμονες.", "difficulty": "Hard", "page": 128, "source": "Βιβλίο"}, {"id": "B8_Q08", "topic": "Ανθρώπινο Γονιδίωμα", "type": "open", "question": "Πόσα ζεύγη βάσεων περιέχει το ανθρώπινο γονιδίωμα και πόσα γονίδια κωδικοποιούν πρωτεΐνες;", "answer": "Το ανθρώπινο γονιδίωμα αποτελείται από 3×10⁹ ζεύγη βάσεων DNA. Αρχικά εκτιμήθηκε ότι υπάρχουν ~100.000 γονίδια, αλλά σήμερα εκτιμάται ότι τα γονίδια που κωδικοποιούν πρωτεΐνες είναι λιγότερα από 40.000.", "hint": "3 δισεκατομμύρια ζεύγη βάσεων, λιγότερα από 40.000 γονίδια.", "difficulty": "Medium", "page": 130, "source": "Βιβλίο"}, {"id": "B8_Q09", "topic": "Αυξητική Ορμόνη", "type": "mcq", "question": "Πριν την ανάπτυξη της Γενετικής Μηχανικής, από πού αποκτούσαν αυξητική ορμόνη για θεραπευτική χρήση;", "options": ["α. Από γενετικά τροποποιημένα βακτήρια", "β. Από εγκεφάλους νεκρών ανθρώπων", "γ. Από το πάγκρεας χοίρων", "δ. Από διαγονιδιακά πρόβατα"], "correct": "β", "answer": "Β. Η αυξητική ορμόνη αποκτούνταν από εγκεφάλους νεκρών ανθρώπων — επικίνδυνη και περιορισμένη πηγή. Μετά το 1985 παράγεται με ανασυνδυασμένο DNA.", "hint": "Η ανθρώπινη αυξητική ορμόνη είναι πολύ ειδική — δεν αντικαθίσταται από ζώα.", "difficulty": "Medium", "page": 123, "source": "Βιβλίο"}, {"id": "B8_Q10", "topic": "Ερυθροποιητίνη", "type": "open", "question": "Τι είναι η ερυθροποιητίνη, πού παράγεται φυσιολογικά και ποια είναι η θεραπευτική της χρήση;", "answer": "Η ερυθροποιητίνη είναι ορμόνη που παράγεται στους νεφρούς. Μεταφέρεται στον μυελό των οστών όπου επάγει την παραγωγή κυττάρων αίματος. Παρασκευάστηκε με ανασυνδυασμένο DNA το 1989 και χρησιμοποιείται για τη θεραπεία ορισμένων αναιμιών.", "hint": "Νεφροί → μυελός οστών → ερυθρά αιμοσφαίρια.", "difficulty": "Medium", "page": 123, "source": "Βιβλίο"}];
const BIOLOGY_CH9 = [{"id": "B9_Q01", "topic": "Πλεονεκτήματα Γενετικής Μηχανικής vs Ελεγχόμενων Διασταυρώσεων", "type": "open", "question": "Ποια είναι τα πλεονεκτήματα της Γενετικής Μηχανικής έναντι της κλασικής μεθόδου ελεγχόμενων διασταυρώσεων για τη βελτίωση οργανισμών;", "answer": "1) Επιλογή και προσθήκη μόνο επιθυμητών ιδιοτήτων, με διατήρηση παλαιών χαρακτηριστικών. 2) Ταχύτητα — γίνεται σε σύντομο χρονικό διάστημα (αντί για γενιές διασταυρώσεων). 3) Ακρίβεια. 4) Δυνατότητα μεταφοράς γονιδίων μεταξύ πολύ απομακρυσμένων ειδών.", "hint": "Ελεγχόμενες διασταυρώσεις = χρονοβόρες και ανακριβείς.", "difficulty": "Medium", "page": 140, "source": "Βιβλίο"}, {"id": "B9_Q02", "topic": "Agrobacterium - Πλασμίδιο Ti", "type": "open", "question": "Πώς χρησιμοποιείται το βακτήριο Agrobacterium tumefaciens και το πλασμίδιο Ti για τη δημιουργία διαγονιδιακών φυτών;", "answer": "Το Agrobacterium tumefaciens έχει φυσική ικανότητα να μολύνει φυτικά κύτταρα με το πλασμίδιο Ti. Οι ερευνητές: 1) απομονώνουν το πλασμίδιο Ti, 2) απενεργοποιούν τα γονίδια που δημιουργούν όγκους, 3) εισάγουν το επιθυμητό γονίδιο στο πλασμίδιο, 4) εισάγουν το ανασυνδυασμένο πλασμίδιο σε φυτικά κύτταρα → δίνουν νέο φυτό που εκφράζει το ξένο γονίδιο.", "hint": "Ti = tumor inducing. Αφαιρούμε τα 'κακά' γονίδια και βάζουμε το επιθυμητό.", "difficulty": "Hard", "page": 137, "source": "Βιβλίο"}, {"id": "B9_Q03", "topic": "Bacillus thuringiensis - Bt Φυτά", "type": "open", "question": "Πώς χρησιμοποιείται το βακτήριο Bacillus thuringiensis για την προστασία των καλλιεργειών από έντομα; Ποιο ήταν το πρώτο φυτό στο οποίο εφαρμόστηκε;", "answer": "Το Bacillus thuringiensis παράγει ισχυρή τοξίνη που καταστρέφει έντομα (80.000 φορές πιο ισχυρή από πολλά εντομοκτόνα). Αρχικά τα βακτήρια πολλαπλασιάζονταν και ψεκάζονταν στον αγρό (ακριβό, βραχύβιο). Στη συνέχεια: απομονώθηκε το γονίδιο της τοξίνης και μεταφέρθηκε στα φυτά με το πλασμίδιο Ti. Το πρώτο φυτό ήταν το καλαμπόκι (ποικιλίες Bt).", "hint": "Bt φυτά = παρά <script>

function renderChapterSelect(){
  const sel=document.getElementById('chapterSelect');
  const totalQ=ALL_QUESTIONS.length;
  const groups={};
  CHAPTERS.forEach((ch,idx)=>{
    if(!groups[ch.group])groups[ch.group]=[];
    groups[ch.group].push({ch,idx});
  });
  let html=`<div class="chapter-group"><h2>// Επιλογή κεφαλαίου</h2><div class="chapter-grid">
    <button class="ch-btn all-btn" onclick="startQuiz(-1)">
      <div class="ch-title">📚 Όλα τα κεφάλαια</div>
      <div class="ch-count">${totalQ} ερωτήσεις συνολικά</div>
    </button></div></div>`;
  for(const[group,items] of Object.entries(groups)){
    html+=`<div class="chapter-group"><h2>// ${group}</h2><div class="chapter-grid">`;
    items.forEach(({ch,idx})=>{
      html+=`<button class="ch-btn" onclick="startQuiz(${idx})">
        <div class="ch-title">${esc(ch.title)}</div>
        <div class="ch-count">${ch.questions.length} ερωτήσεις · Κεφ. ${ch.chapter}</div>
      </button>`;
    });
    html+=`</div></div>`;
  }
  sel.innerHTML=html;
}

function startQuiz(idx){
  activeChapterIdx=idx;
  document.getElementById('chapterSelect').style.display='none';
  document.getElementById('quizArea').style.display='block';
  const ch=idx===-1?{title:'Όλα τα κεφάλαια'}:CHAPTERS[idx];
  document.getElementById('subtitle').textContent=ch.title;
  resetSession();
}

function buildQuestionList(){
  let pool=activeChapterIdx===-1?[...ALL_QUESTIONS]:[...CHAPTERS[activeChapterIdx].questions];
  const diff=filterDiffs[filterMode];
  if(diff)pool=pool.filter(q=>q.difficulty===diff);
  if(shuffleOn)pool=shuffle(pool);
  return pool;
}

function resetSession(){
  activeQuestions=buildQuestionList();
  current=0;sessionLog=[];elapsed=0;
  sessionStart=Date.now();
  clearInterval(timerInterval);
  timerInterval=setInterval(updateTimer,1000);
  renderQuestion();updateProgress();
}

function backToChapters(){
  clearInterval(timerInterval);
  document.getElementById('quizArea').style.display='none';
  document.getElementById('chapterSelect').style.display='flex';
  document.getElementById('questionArea').innerHTML='';
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

function updateTimer(){
  elapsed=Math.floor((Date.now()-sessionStart)/1000);
  const m=Math.floor(elapsed/60),s=(elapsed%60).toString().padStart(2,'0');
  document.getElementById('statTime').textContent=m+':'+s;
}

function updateProgress(){
  const total=activeQuestions.length,done=sessionLog.length;
  const pct=total?(done/total*100):0;
  const correct=sessionLog.filter(x=>x.correct===true).length;
  const wrong=sessionLog.filter(x=>x.correct===false).length;
  document.getElementById('progressCounter').textContent=done+' / '+total;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('statCorrect').textContent=correct;
  document.getElementById('statWrong').textContent=wrong;
}

    const opts=(q.options||[]).map(o=>{
      const m=o.match(/^([α-ωa-zA-Z0-9]+)\.\s*(.+)$/);
      return m?{letter:m[1],text:m[2]}:{letter:'?',text:o};
    });
    bodyHTML=`<div class="options-list">`+
      opts.map(opt=>`<button class="option-btn" id="opt-${opt.letter}" onclick="answerMCQ('${opt.letter}')">
        <span class="option-letter">${opt.letter}</span><span>${esc(opt.text)}</span></button>`).join('')+
      `</div>`;
  } else if(q.type==='fill_blank'){
    bodyHTML=`<div class="fb-wrap">
      <div class="fb-hint">// Συμπλήρωσε και πάτα Enter</div>
      <div class="fb-input-row">
        <input class="fb-input" id="fb-input" type="text" placeholder="Η απάντησή σου..."
          onkeydown="if(event.key==='Enter')answerFB()" autocomplete="off" spellcheck="false">
        <button class="fb-submit" id="fb-submit" onclick="answerFB()">Υποβολή</button>
      </div>
      <div id="fb-result"></div></div>`;
  } else {
    bodyHTML=`<div class="open-wrap">
      <div class="open-label">// Ανοιχτή ερώτηση</div>
      ${q.hint?`<em style="font-size:13px;color:var(--amber)">💡 ${esc(q.hint)}</em>`:''}
    </div>
    <button class="open-reveal-btn" onclick="revealOpen()">👁 Εμφάνιση απάντησης</button>
    <div class="open-answer" id="openAnswer">
      <div class="open-answer-label">// Απάντηση</div>${esc(q.answer)}
    </div>`;
  }

  area.innerHTML=`<div class="q-card">
    <div class="q-meta">
      <span class="badge ${diffMap[q.difficulty]||'badge-medium'}">${diffLbl[q.difficulty]||q.difficulty}</span>
      <span class="badge badge-type">${typeLbl[q.type]||q.type}</span>
      ${q.page?`<span class="badge badge-page">σ. ${q.page}</span>`:''}
    </div>
    <div class="q-number">Ερώτηση ${current+1} από ${activeQuestions.length}</div>
    ${q.topic?`<div class="q-topic">📌 ${esc(q.topic)}</div>`:''}
    <div class="q-text">${esc(q.question)}</div>
    ${bodyHTML}
    <div id="explanation" style="display:none"></div>
    <div id="hintBox" class="hint-box"></div>
    <div class="q-actions">
      ${q.hint&&q.type!=='open'?`<button class="btn btn-hint" onclick="showHint()">💡 Υπόδειξη</button>`:''}
      <button class="btn btn-ghost" onclick="skipQuestion()">Παράλειψη</button>
      <button class="btn btn-primary" id="btnNext" onclick="nextQuestion()" disabled>Επόμενη →</button>
    </div>
  </div>`;
}

function esc(str){
  if(!str)return'';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function answerMCQ(letter){
  if(answered)return;answered=true;
  const q=activeQuestions[current];
  const correct=letter===q.correct;
  sessionLog.push({correct});
  const opts=(q.options||[]).map(o=>{const m=o.match(/^([α-ωa-zA-Z0-9]+)\./);return m?m[1]:'?';});
  opts.forEach(l=>{
    const btn=document.getElementById('opt-'+l);
    if(!btn)return;btn.disabled=true;
    if(l===letter)btn.classList.add(correct?'correct':'wrong');
    if(l===q.correct&&!correct)btn.classList.add('correct');
  });
  showExp(q.answer,correct);
  document.getElementById('btnNext').disabled=false;
  updateProgress();
}

function answerFB(){
  if(answered)return;
  const q=activeQuestions[current];
  const input=document.getElementById('fb-input');
  const userVal=input.value.trim().toLowerCase();
  const correctVal=(q.answer||'').toLowerCase();
  const correct=correctVal.includes(userVal)&&userVal.length>2;
  answered=true;
  sessionLog.push({correct});
  input.disabled=true;document.getElementById('fb-submit').disabled=true;
  input.classList.add(correct?'correct':'wrong');
  if(!correct)document.getElementById('fb-result').innerHTML=`<div class="fb-correct-answer">✓ Απάντηση: ${esc(q.answer)}</div>`;
  showExp(q.answer,correct);
  document.getElementById('btnNext').disabled=false;
  updateProgress();
}

function revealOpen(){
  if(answered)return;answered=true;
  sessionLog.push({correct:null});
  document.getElementById('openAnswer').classList.add('show');
  document.getElementById('btnNext').disabled=false;
  updateProgress();
}

function showExp(text,correct){
  if(!text||activeQuestions[current].type==='open')return;
  const el=document.getElementById('explanation');
  const color=correct?'var(--green)':'var(--red)';
  const label=correct?'✓ Σωστά!':'✗ Λάθος!';
  el.style.display='block';
  el.innerHTML=`<strong style="color:${color}">${label}</strong><br><br>${esc(text)}`;
}

function showHint(){
  const q=activeQuestions[current];
  const h=document.getElementById('hintBox');
  h.textContent='💡 '+q.hint;h.classList.add('show');
}

function nextQuestion(){current++;current>=activeQuestions.length?renderResults():renderQuestion();}

function skipQuestion(){
  if(!answered){sessionLog.push({correct:null,skipped:true});updateProgress();}
  current++;current>=activeQuestions.length?renderResults():renderQuestion();
}

function renderResults(){
  clearInterval(timerInterval);
  const scored=sessionLog.filter(x=>x.correct!==null&&!x.skipped);
  const correct=scored.filter(x=>x.correct===true).length;
  const wrong=scored.filter(x=>x.correct===false).length;
  const pct=scored.length?Math.round(correct/scored.length*100):0;
  const m=Math.floor(elapsed/60),s=(elapsed%60).toString().padStart(2,'0');
  let gc,gl;
  if(pct>=75){gc='grade-A';gl='Άριστα 🏆';}
  else if(pct>=50){gc='grade-B';gl='Καλά 👍';}
  else{gc='grade-C';gl='Χρειάζεσαι επανάληψη 📚';}
  document.getElementById('questionArea').innerHTML=`
    <div class="results-card">
      <div class="results-label">Αποτέλεσμα Συνεδρίας</div>
      <div class="results-score">${pct}%</div>
      <div class="results-grade ${gc}">${gl}</div>
      <div class="results-grid">
        <div class="res-stat c"><div class="res-stat-val">${correct}</div><div class="res-stat-lbl">Σωστές</div></div>
        <div class="res-stat w"><div class="res-stat-val">${wrong}</div><div class="res-stat-lbl">Λάθος</div></div>
        <div class="res-stat t"><div class="res-stat-val">${m}:${s}</div><div class="res-stat-lbl">Χρόνος</div></div>
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="resetSession()">↺ Νέα Προσπάθεια</button>
      <button class="back-btn" onclick="backToChapters()">← Επιλογή κεφαλαίου</button>
    </div>`;
}

function toggleShuffle(){
  shuffleOn=!shuffleOn;
  document.getElementById('btnShuffle').classList.toggle('active',shuffleOn);
  showToast(shuffleOn?'🔀 Τυχαία σειρά ενεργή':'📋 Κανονική σειρά');
  resetSession();
}

function cycleFilter(){
  filterMode=(filterMode+1)%4;
  document.getElementById('filterLabel').textContent=filterLabels[filterMode];
  document.getElementById('btnFilter').classList.toggle('active',filterMode!==0);
  resetSession();
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

renderChapterSelect();
</script>
</body>
</html>
